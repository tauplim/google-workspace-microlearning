    <script>
        const channel = new BroadcastChannel('sync_module_6_ai-productivity');
        function openReferenceInAudience(url) { channel.postMessage({ type: 'open-tab-url', url: url }); }
        function toggleReferenceDesk() { document.getElementById('referenceContent').classList.toggle('open'); document.getElementById('referenceToggle').classList.toggle('open'); }

        const courseData = [
            { title: "Slide 1: Title - Module 6: Drive & File Management", content: '<div class="w-full flex flex-col items-center justify-center text-center"><div class="mb-6 px-4 py-1 rounded-full bg-blue-500/20 text-blue-400 text-sm font-semibold border border-blue-500/30">MODULE 6</div><h1 class="text-5xl md:text-7xl font-extrabold mb-6">Drive & File Management</h1><p class="text-2xl md:text-3xl text-slate-400 mb-8">AI-Powered Search and Systematic Organization</p><div class="flex items-center gap-4 text-slate-500 text-lg"><span><i class="fa-regular fa-clock mr-2"></i>30 min</span><span class="text-purple-400">|</span><span><i class="fa-solid fa-graduation-cap mr-2"></i>Module 6 of 8</span></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 1]***</div><div class="timing-box"><i class="fa-regular fa-clock text-slate-400"></i> <span class="time-range">0:00-0:03</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-star"></i>KEY MESSAGE</div><p class="key-message">Welcome to the file management module. Today we solve the problem everyone has: too many files, can\'t find anything.</p></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i> TRAINER ACTION</div><ul><li>Stand at speaker podium, make eye contact</li><li>State module number and title clearly</li><li>Set expectations: hands-on workshop focused</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Opening:</p><p>"Welcome to Module 6: Drive & File Management. Today we\'re tackling one of the most universal workplace frustrations — finding files."</p><p class="script-heading">Key Talking Points:</p><ul><li>AI has changed how we search for files</li><li>Systematic organization still matters</li><li>Workshop: participants build their own folder structure</li></ul><p>"By end of session, you\'ll have a personal Drive organization system you can use immediately."</p></div></div>' },
            { title: "Slide 2: Learning Objectives", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Learning Objectives</h2><div class="space-y-5 w-full max-w-4xl"><div class="flex items-start gap-4 bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center flex-shrink-0"><span class="text-blue-400 font-bold">1</span></div><p class="text-xl font-semibold text-white">Use natural language search to locate files without knowing the filename</p></div><div class="flex items-start gap-4 bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center flex-shrink-0"><span class="text-blue-400 font-bold">2</span></div><p class="text-xl font-semibold text-white">Create a systematic folder hierarchy for a project or topic area</p></div><div class="flex items-start gap-4 bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center flex-shrink-0"><span class="text-blue-400 font-bold">3</span></div><p class="text-xl font-semibold text-white">Set appropriate sharing permissions for different file types</p></div><div class="flex items-start gap-4 bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center flex-shrink-0"><span class="text-blue-400 font-bold">4</span></div><p class="text-xl font-semibold text-white">Implement an ongoing file organization system</p></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 2]***</div><div class="timing-box"><i class="fa-regular fa-clock text-slate-400"></i> <span class="time-range">0:03-0:05</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-star"></i>KEY MESSAGE</div><p class="key-message">Four outcomes: natural language search, folder hierarchy, sharing permissions, ongoing system.</p></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i> TRAINER ACTION</div><ul><li>Read through each objective with brief explanation</li><li>Emphasize "ongoing system" - not one-time cleanup</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Review Objectives:</p><ol><li><strong>Natural language search</strong> - Find files without knowing the name</li><li><strong>Folder hierarchy</strong> - Create systematic structure</li><li><strong>Sharing permissions</strong> - Set appropriate access levels</li><li><strong>Ongoing system</strong> - Maintain organization over time</li></ol><p>"Notice the progression: search today, structure for tomorrow, permissions for collaboration, maintenance for long-term."</p></div></div>' },
            { title: "Slide 3: Session Overview", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Session Overview</h2><div class="w-full max-w-4xl"><div class="grid grid-cols-3 gap-4 mb-6"><div class="bg-blue-600/20 p-4 rounded-xl border-l-4 border-blue-400 text-center"><div class="text-3xl font-bold text-blue-400 mb-2">12</div><div class="text-sm text-slate-400 uppercase tracking-wide">Minutes</div><div class="text-lg font-semibold mt-2 text-blue-300">LEARN</div></div><div class="bg-emerald-600/20 p-4 rounded-xl border-l-4 border-emerald-400 text-center"><div class="text-3xl font-bold text-emerald-400 mb-2">18</div><div class="text-sm text-slate-400 uppercase tracking-wide">Minutes</div><div class="text-lg font-semibold mt-2 text-emerald-300">CONSOLIDATE</div></div><div class="bg-purple-600/20 p-4 rounded-xl border-l-4 border-purple-400 text-center"><div class="text-3xl font-bold text-purple-400 mb-2">2</div><div class="text-sm text-slate-400 uppercase tracking-wide">Minutes</div><div class="text-lg font-semibold mt-2 text-purple-300">COMPRESS</div></div></div><div class="bg-slate-800/50 p-6 rounded-xl border border-slate-700"><div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm"><div><p class="text-blue-400 font-semibold mb-2">LEARN Phase</p><ul class="text-slate-400 space-y-1"><li>File organization problem</li><li>AI-powered search capabilities</li><li>Live demonstration</li></ul></div><div><p class="text-emerald-400 font-semibold mb-2">CONSOLIDATE Phase</p><ul class="text-slate-400 space-y-1"><li>Organize project Drive</li><li>Search challenge exercise</li><li>Share-back and debrief</li></ul></div><div><p class="text-purple-400 font-semibold mb-2">COMPRESS Phase</p><ul class="text-slate-400 space-y-1"><li>Pattern recap</li><li>Drive organization system</li><li>Bridge to Module 7</li></ul></div></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 3]***</div><div class="timing-box"><i class="fa-regular fa-clock text-slate-400"></i> <span class="time-range">0:05-0:07</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-star"></i>KEY MESSAGE</div><p class="key-message">40:60 split: 12 min lecture/demo, 18 min hands-on workshop. The real work happens in consolidation.</p></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i> TRAINER ACTION</div><ul><li>Walk through the three phases briefly</li><li>Point to each phase box</li><li>Signal that workshop is where they build their own system</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Phase Overview:</p><ol><li><strong>LEARN (12 min)</strong> - File problem, AI search capabilities, live demo</li><li><strong>CONSOLIDATE (18 min)</strong> - Organize project Drive, search challenge, share-back</li><li><strong>COMPRESS (2 min)</strong> - Take-away template, bridge to Module 7</li></ol><p>"The workshop is where you apply this to YOUR actual files. Come ready to organize something real."</p></div></div>' },
            { title: "Slide 4: The File Organization Problem", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">The File Organization Problem</h2><p class="text-xl text-slate-400 mb-8">The typical Drive scenario</p><div class="w-full max-w-5xl"><div class="overflow-hidden rounded-xl border border-slate-700 mb-6"><table class="w-full"><thead class="bg-slate-800"><tr><th class="text-left p-4 text-blue-400 font-semibold">Metric</th><th class="text-left p-4 text-blue-400 font-semibold">Reality</th></tr></thead><tbody class="divide-y divide-slate-700"><tr class="bg-slate-800/30"><td class="p-4 text-slate-300">Average files per knowledge worker</td><td class="p-4 text-red-400">10,000+</td></tr><tr><td class="p-4 text-slate-300">Time spent searching for files</td><td class="p-4 text-red-400">2.5 hours/week</td></tr><tr class="bg-slate-800/30"><td class="p-4 text-slate-300">Files never found</td><td class="p-4 text-yellow-400">7% of total</td></tr><tr><td class="p-4 text-slate-300">Version confusion</td><td class="p-4 text-yellow-400">1 in 5 collaborative edits</td></tr></tbody></table></div><div class="bg-red-900/20 p-5 rounded-xl border border-red-500/30 text-center"><p class="text-2xl font-bold text-red-400 mb-2">$6,500/year lost productivity</p><p class="text-slate-400">2.5 hrs/week at $50/hr = $6,500 annually</p></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 4]***</div><div class="timing-box"><i class="fa-regular fa-clock text-slate-400"></i> <span class="time-range">0:07-0:10</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-star"></i>KEY MESSAGE</div><p class="key-message">The cost is real: $6,500/year in lost productivity per knowledge worker. This is a solvable problem.</p></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i> TRAINER ACTION</div><ul><li>Walk through the metrics table</li><li>Emphasize the $6,500 cost figure</li><li>Pause for the number to sink in</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">The Problem in Numbers:</p><ul><li>Average knowledge worker has <strong>10,000+ files</strong></li><li>Spends <strong>2.5 hours/week</strong> searching for files</li><li><strong>7% of files</strong> are never found</li><li><strong>1 in 5 collaborative edits</strong> has version confusion</li></ul><p class="script-heading">The Cost:</p><p>"2.5 hours/week at $50/hour = $6,500/year per person. For a team of 10, that\'s $65,000 annually in lost productivity."</p><p class="script-heading">The Shift:</p><p>"But here\'s the good news: AI has fundamentally changed what\'s possible. The question is no longer \'Where did I save this?\' but \'What am I looking for?\'"</p></div></div>' },
            { title: "Slide 5: Why Traditional Solutions Fail", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Why Traditional Solutions Fail</h2><div class="w-full max-w-5xl"><div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6"><div class="bg-red-900/20 p-6 rounded-xl border border-red-500/30"><div class="flex items-center gap-3 mb-3"><div class="w-10 h-10 rounded-full bg-red-500/20 flex items-center justify-center"><i class="fa-solid fa-xmark text-red-400 text-xl"></i></div><h3 class="font-bold text-xl text-red-400">Inconsistent Naming</h3></div><p class="text-slate-300">Everyone has different conventions - impossible to predict</p></div><div class="bg-red-900/20 p-6 rounded-xl border border-red-500/30"><div class="flex items-center gap-3 mb-3"><div class="w-10 h-10 rounded-full bg-red-500/20 flex items-center justify-center"><i class="fa-solid fa-folder-tree text-red-400 text-xl"></i></div><h3 class="font-bold text-xl text-red-400">Deep Hierarchies</h3></div><p class="text-slate-300">Files buried 5+ levels deep - cannot navigate</p></div><div class="bg-red-900/20 p-6 rounded-xl border border-red-500/30"><div class="flex items-center gap-3 mb-3"><div class="w-10 h-10 rounded-full bg-red-500/20 flex items-center justify-center"><i class="fa-solid fa-copy text-red-400 text-xl"></i></div><h3 class="font-bold text-xl text-red-400">No Source of Truth</h3></div><p class="text-slate-300">Multiple copies of same document everywhere</p></div><div class="bg-red-900/20 p-6 rounded-xl border border-red-500/30"><div class="flex items-center gap-3 mb-3"><div class="w-10 h-10 rounded-full bg-red-500/20 flex items-center justify-center"><i class="fa-solid fa-users-slash text-red-400 text-xl"></i></div><h3 class="font-bold text-xl text-red-400">Sharing Confusion</h3></div><p class="text-slate-300">Who has access to what?</p></div></div><div class="bg-emerald-900/20 p-5 rounded-xl border border-emerald-500/30 text-center"><p class="text-2xl font-bold text-emerald-400 mb-2">AI Changes the Game</p><p class="text-xl text-slate-300">Instead of "Where did I save this?" → "What am I looking for?"</p></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 5]***</div><div class="timing-box"><i class="fa-regular fa-clock text-slate-400"></i> <span class="time-range">0:10-0:12</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-star"></i>KEY MESSAGE</div><p class="key-message">Traditional organization fails because it relies on humans being consistent. AI doesn\'t need consistency.</p></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i> TRAINER ACTION</div><ul><li>Walk through each failure reason</li><li>Connect to the AI solution</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Four Failure Modes:</p><ul><li><strong>Inconsistent naming</strong> - Everyone has different conventions</li><li><strong>Deep hierarchies</strong> - Files buried 5+ levels deep</li><li><strong>No source of truth</strong> - Multiple copies everywhere</li><li><strong>Sharing confusion</strong> - Who has access to what?</li></ul><p class="script-heading">Why They Fail:</p><p>"All of these rely on humans being consistent. And we\'re not. We forget, we rush, we interpret differently."</p><p class="script-heading">The AI Solution:</p><p>"AI doesn\'t need your files to be named correctly. It understands content. So \'what\' over \'where\' becomes the new paradigm."</p></div></div>' },
            { title: "Slide 6: Search Evolution", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Google Drive Search Evolution</h2><div class="w-full max-w-5xl"><div class="overflow-hidden rounded-xl border border-slate-700 mb-6"><table class="w-full"><thead class="bg-slate-800"><tr><th class="text-left p-4 text-blue-400 font-semibold">Era</th><th class="text-left p-4 text-blue-400 font-semibold">Method</th><th class="text-left p-4 text-blue-400 font-semibold">Limitation</th></tr></thead><tbody class="divide-y divide-slate-700"><tr class="bg-slate-800/30"><td class="p-4 text-slate-300">2010s</td><td class="p-4 text-yellow-400">File name search</td><td class="p-4 text-slate-400">Must know exact name</td></tr><tr><td class="p-4 text-slate-300">2020-2024</td><td class="p-4 text-yellow-400">Advanced operators</td><td class="p-4 text-slate-400">file:doc contains:"budget"</td></tr><tr class="bg-slate-800/30"><td class="p-4 text-slate-300">2025+</td><td class="p-4 text-emerald-400">Natural language</td><td class="p-4 text-emerald-400">Semantic understanding</td></tr></tbody></table></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 6]***</div><div class="timing-box"><i class="fa-regular fa-clock text-slate-400"></i> <span class="time-range">0:12-0:14</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-star"></i>KEY MESSAGE</div><p class="key-message">Search has evolved from exact matching to semantic understanding. We\'re in the AI era now.</p></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i> TRAINER ACTION</div><ul><li>Walk through the three eras</li><li>Show progression to natural language</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Three Eras of Search:</p><ul><li><strong>2010s</strong> - File name search: had to know exact name</li><li><strong>2020-2024</strong> - Advanced operators: file:doc contains:"budget"</li><li><strong>2025+</strong> - Natural language: "Find my Q3 budget from any email attachment"</li></ul><p class="script-heading">The Evolution:</p><p>"Each era removed a limitation. But we\'re still transitioning. Many people still use 2010s-style search because they don\'t know what\'s possible now."</p><p>"Today you\'ll learn to search like it\'s 2025."</p></div></div>' },
            { title: "Slide 7: Natural Language Search Examples", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Natural Language Search Examples</h2><div class="w-full max-w-5xl"><div class="space-y-4"><div class="bg-slate-800/50 p-5 rounded-xl border border-blue-500/30"><div class="flex items-start gap-4"><div class="w-12 h-12 rounded-full bg-blue-500/20 flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-search text-blue-400 text-xl"></i></div><div><p class="text-blue-400 font-semibold mb-2">"Find contracts I haven\'t reviewed yet"</p><p class="text-emerald-400">→ Locates unreviewed contract files</p></div></div></div><div class="bg-slate-800/50 p-5 rounded-xl border border-purple-500/30"><div class="flex items-start gap-4"><div class="w-12 h-12 rounded-full bg-purple-500/20 flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-presentation text-purple-400 text-xl"></i></div><div><p class="text-purple-400 font-semibold mb-2">"Where is the presentation from last quarter\'s all-hands?"</p><p class="text-emerald-400">→ Shows presentation with metadata</p></div></div></div><div class="bg-slate-800/50 p-5 rounded-xl border border-emerald-500/30"><div class="flex items-start gap-4"><div class="w-12 h-12 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-user text-emerald-400 text-xl"></i></div><div><p class="text-emerald-400 font-semibold mb-2">"Find files modified by Sarah in the past week"</p><p class="text-emerald-400">→ Filters by owner and date</p></div></div></div><div class="bg-slate-800/50 p-5 rounded-xl border border-yellow-500/30"><div class="flex items-start gap-4"><div class="w-12 h-12 rounded-full bg-yellow-500/20 flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-table text-yellow-400 text-xl"></i></div><div><p class="text-yellow-400 font-semibold mb-2">"Show me all spreadsheets about budget"</p><p class="text-emerald-400">→ Semantic search across content</p></div></div></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 7]***</div><div class="timing-box"><i class="fa-regular fa-clock text-slate-400"></i> <span class="time-range">0:14-0:16</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-star"></i>KEY MESSAGE</div><p class="key-message">These are real queries you can use TODAY. Natural language search understands intent and content.</p></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i> TRAINER ACTION</div><ul><li>Read each example aloud</li><li>Show the arrow to the result</li><li>Emphasize: no need to know filename</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Four Examples:</p><ol><li>"Find contracts I haven\'t reviewed yet" → <strong>Locates unreviewed files</strong></li><li>"Where is the presentation from last quarter\'s all-hands?" → <strong>Shows with metadata</strong></li><li>"Find files modified by Sarah in the past week" → <strong>Filters by owner and date</strong></li><li>"Show me all spreadsheets about budget" → <strong>Semantic content search</strong></li></ol><p class="script-heading">Key Insight:</p><p>"None of these queries mention a specific filename. They\'re describing what you want. That\'s the paradigm shift."</p></div></div>' },
            { title: "Slide 8: Beyond Search - AI Organization", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Beyond Search: AI Organization</h2><div class="w-full max-w-5xl"><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div class="bg-gradient-to-br from-blue-600/20 to-slate-800/50 p-6 rounded-xl border border-blue-500/30"><div class="w-12 h-12 rounded-full bg-blue-500/20 flex items-center justify-center mb-4"><i class="fa-solid fa-folder-plus text-blue-400 text-xl"></i></div><h3 class="font-bold text-xl text-blue-400 mb-2">Smart Categorization</h3><p class="text-slate-300">AI suggests folders based on file content</p></div><div class="bg-gradient-to-br from-purple-600/20 to-slate-800/50 p-6 rounded-xl border border-purple-500/30"><div class="w-12 h-12 rounded-full bg-purple-500/20 flex items-center justify-center mb-4"><i class="fa-solid fa-copy text-purple-400 text-xl"></i></div><h3 class="font-bold text-xl text-purple-400 mb-2">Duplicate Detection</h3><p class="text-slate-300">Finds files with similar content</p></div><div class="bg-gradient-to-br from-emerald-600/20 to-slate-800/50 p-6 rounded-xl border border-emerald-500/30"><div class="w-12 h-12 rounded-full bg-emerald-500/20 flex items-center justify-center mb-4"><i class="fa-solid fa-chart-line text-emerald-400 text-xl"></i></div><h3 class="font-bold text-xl text-emerald-400 mb-2">Access Insights</h3><p class="text-slate-300">Shows who views and edits your files</p></div><div class="bg-gradient-to-br from-yellow-600/20 to-slate-800/50 p-6 rounded-xl border border-yellow-500/30"><div class="w-12 h-12 rounded-full bg-yellow-500/20 flex items-center justify-center mb-4"><i class="fa-solid fa-trash text-yellow-400 text-xl"></i></div><h3 class="font-bold text-xl text-yellow-400 mb-2">Storage Cleanup</h3><p class="text-slate-300">Identifies large/unused files</p></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 8]***</div><div class="timing-box"><i class="fa-regular fa-clock text-slate-400"></i> <span class="time-range">0:16-0:18</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-star"></i>KEY MESSAGE</div><p class="key-message">AI does more than find files - it helps organize, detects duplicates, shows access patterns, cleans storage.</p></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i> TRAINER ACTION</div><ul><li>Walk through each AI feature</li><li>These are under-used capabilities</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">AI Organization Features:</p><ul><li><strong>Smart categorization</strong> - AI suggests folders based on content</li><li><strong>Duplicate detection</strong> - Finds similar content files</li><li><strong>Access insights</strong> - Shows who views/edits your files</li><li><strong>Storage cleanup</strong> - Identifies large/unused files</li></ul><p class="script-heading">Practical Applications:</p><p>"Smart categorization is great for new uploads. Duplicate detection saves space. Access insights help with collaboration audits. Storage cleanup keeps Drive fast."</p></div></div>' },
            { title: "Slide 9: Live Demonstration", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Live Demonstration</h2><p class="text-xl text-slate-400 mb-10">Watch the trainer perform these actions</p><div class="w-full max-w-5xl"><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="flex items-center gap-3 mb-3"><div class="w-8 h-8 rounded-lg bg-blue-500/20 flex items-center justify-center"><span class="text-blue-400 font-bold text-sm">1</span></div><h3 class="font-bold text-lg">Natural Language Search</h3></div><p class="text-sm text-slate-400">Type semantic queries in Drive search</p></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="flex items-center gap-3 mb-3"><div class="w-8 h-8 rounded-lg bg-purple-500/20 flex items-center justify-center"><span class="text-purple-400 font-bold text-sm">2</span></div><h3 class="font-bold text-lg">Advanced Search Filters</h3></div><p class="text-sm text-slate-400">Use operators like "from:me has:attachment"</p></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="flex items-center gap-3 mb-3"><div class="w-8 h-8 rounded-lg bg-emerald-500/20 flex items-center justify-center"><span class="text-emerald-400 font-bold text-sm">3</span></div><h3 class="font-bold text-lg">Create Folder Structure</h3></div><p class="text-sm text-slate-400">Build numbered hierarchy with subfolders</p></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="flex items-center gap-3 mb-3"><div class="w-8 h-8 rounded-lg bg-yellow-500/20 flex items-center justify-center"><span class="text-yellow-400 font-bold text-sm">4</span></div><h3 class="font-bold text-lg">Set Sharing Permissions</h3></div><p class="text-sm text-slate-400">Folder-level vs. file-level sharing</p></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700 md:col-span-2"><div class="flex items-center gap-3 mb-3"><div class="w-8 h-8 rounded-lg bg-red-500/20 flex items-center justify-center"><span class="text-red-400 font-bold text-sm">5</span></div><h3 class="font-bold text-lg">Star and Priority Files</h3></div><p class="text-sm text-slate-400">Create shortcuts for quick access in My Drive</p></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 9]***</div><div class="timing-box"><i class="fa-regular fa-clock text-slate-400"></i> <span class="time-range">0:18-0:22</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-star"></i>KEY MESSAGE</div><p class="key-message">Demonstrate live! Show actual Drive search and folder creation. Seeing is believing.</p></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i> TRAINER ACTION</div><ul><li>Open Drive in browser</li><li>DEMO 1: Natural language search</li><li>DEMO 2: Advanced filters</li><li>DEMO 3: Create folder structure</li><li>DEMO 4: Sharing permissions</li><li>DEMO 5: Star files</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Demo Setup:</p><p>"Let me show you these capabilities live. I\'ll share my screen."</p><p class="script-heading">Demo Sequence:</p><ol><li><strong>Natural Language Search:</strong> Type "Find spreadsheets about monthly expenses" - show semantic results</li><li><strong>Advanced Filters:</strong> Try "from:me has:attachment older_than:30d" - show filtered results</li><li><strong>Folder Structure:</strong> Create "Project Alpha" with numbered subfolders (01-Background, 02-Materials, etc.)</li><li><strong>Sharing:</strong> Show folder-level vs. file-level permissions, "Apply to folder" option</li><li><strong>Stars:</strong> Star important files, create My Drive shortcuts</li></ol><p>"Notice: I\'m not organizing anything - I\'m just showing what\'s possible. The workshop is where you\'ll organize your own."</p></div></div>' },
            { title: "Slide 10: Workshop - Task 1", content: '<div class="w-full flex flex-col items-center justify-center"><div class="mb-4 px-4 py-1 rounded-full bg-emerald-500/20 text-emerald-400 text-sm font-semibold border border-emerald-500/30">WORKSHOP</div><h2 class="text-4xl font-bold mb-4">Task 1: AI-Assisted File Search</h2><p class="text-xl text-slate-400 mb-6">Time: 3 minutes</p><div class="w-full max-w-4xl"><div class="bg-slate-800/50 p-5 rounded-xl border border-emerald-500/30"><p class="text-slate-300 mb-4">Try these natural language searches in Drive:</p><div class="space-y-3"><div class="bg-slate-900 p-3 rounded-lg"><p class="text-blue-400 font-semibold">Search 1:</p><p class="text-slate-300">"Find files I haven\'t opened in over a month"</p></div><div class="bg-slate-900 p-3 rounded-lg"><p class="text-purple-400 font-semibold">Search 2:</p><p class="text-slate-300">"Find [topic from your work]"</p></div><div class="bg-slate-900 p-3 rounded-lg"><p class="text-emerald-400 font-semibold">Search 3:</p><p class="text-slate-300">"Show me files modified this week"</p></div></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 10]***</div><div class="timing-box"><i class="fa-regular fa-clock text-slate-400"></i> <span class="time-range">0:22-0:25</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-star"></i>KEY MESSAGE</div><p class="key-message">Workshop time! Task 1: Try AI-powered search on YOUR files. 3 minutes.</p></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i> TRAINER ACTION</div><ul><li>Start workshop timer - 3 minutes</li><li>Walk around room, help participants</li><li>Encourage trying real search queries</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Task 1 Instructions:</p><p>"Time for the workshop. Task 1: AI-Assisted File Search. You have 3 minutes."</p><p class="script-heading">Searches to Try:</p><ol><li>"Find files I haven\'t opened in over a month" - notice how many appear</li><li>"Find [your work topic]" - how accurate is semantic search?</li><li>"Show me files modified this week" - check recent activity</li></ol><p class="script-heading">Coaching Points:</p><ul><li>If search is inaccurate: try more specific natural language</li><li>If no results: broaden the query</li><li>Document what works and what doesn\'t</li></ul></div></div>' },
            { title: "Slide 11: Workshop - Task 2", content: '<div class="w-full flex flex-col items-center justify-center"><div class="mb-4 px-4 py-1 rounded-full bg-emerald-500/20 text-emerald-400 text-sm font-semibold border border-emerald-500/30">WORKSHOP</div><h2 class="text-4xl font-bold mb-4">Task 2: Create Project Folder Structure</h2><p class="text-xl text-slate-400 mb-6">Time: 4 minutes</p><div class="w-full max-w-4xl"><div class="bg-slate-800/50 p-5 rounded-xl border border-emerald-500/30 mb-4"><p class="text-slate-300 mb-3">Create a project folder with this structure:</p><div class="bg-slate-900 p-4 rounded-lg text-sm font-mono"><p class="text-emerald-400 mb-2">[Your Project]/</p><p class="text-slate-400 ml-4">├── 01-Background/</p><p class="text-slate-400 ml-4">├── 02-Materials/</p><p class="text-slate-400 ml-4">├── 03-Drafts/</p><p class="text-slate-400 ml-4">├── 04-Feedback/</p><p class="text-slate-400 ml-4">└── 05-Archive/</p></div></div><p class="text-center text-slate-500 text-sm">Add brief descriptions to each folder. Move at least one file into the structure.</p></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 11]***</div><div class="timing-box"><i class="fa-regular fa-clock text-slate-400"></i> <span class="time-range">0:25-0:29</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-star"></i>KEY MESSAGE</div><p class="key-message">Task 2: Create YOUR project folder structure. Use the numbered template. 4 minutes.</p></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i> TRAINER ACTION</div><ul><li>Start timer - 4 minutes</li><li>Point to the folder template</li><li>Participants create in their own Drive</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Task 2 Instructions:</p><p>"Now create your project folder structure. Use the numbered template on screen."</p><p class="script-heading">Folder Template:</p><ul><li>01-Background (research, sources)</li><li>02-Materials (assets, data)</li><li>03-Drafts (working documents)</li><li>04-Feedback (iterations, reviews)</li><li>05-Archive (completed work)</li></ul><p class="script-heading">Key Principles:</p><ul><li>Number prefix for alphabetical + chronological order</li><li>Descriptive names</li><li>Add description to each folder</li><li>Move at least one existing file into structure</li></ul></div></div>' },
            { title: "Slide 12: Workshop - Task 3", content: '<div class="w-full flex flex-col items-center justify-center"><div class="mb-4 px-4 py-1 rounded-full bg-emerald-500/20 text-emerald-400 text-sm font-semibold border border-emerald-500/30">WORKSHOP</div><h2 class="text-4xl font-bold mb-4">Task 3: Set Sharing Permissions</h2><p class="text-xl text-slate-400 mb-6">Time: 3 minutes</p><div class="w-full max-w-3xl"><div class="bg-slate-800/50 p-6 rounded-xl border border-emerald-500/30"><div class="space-y-4"><div class="flex items-start gap-4"><div class="w-10 h-10 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold">1</span></div><p class="text-lg text-slate-200">Share main project folder with a partner</p></div><div class="flex items-start gap-4"><div class="w-10 h-10 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold">2</span></div><p class="text-lg text-slate-200">Choose "Anyone with link can view"</p></div><div class="flex items-start gap-4"><div class="w-10 h-10 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold">3</span></div><p class="text-lg text-slate-200">For a subfolder, choose "Restricted - only you"</p></div></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 12]***</div><div class="timing-box"><i class="fa-regular fa-clock text-slate-400"></i> <span class="time-range">0:29-0:32</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-star"></i>KEY MESSAGE</div><p class="key-message">Task 3: Set sharing permissions. Why might folder vs. file level differ? 3 minutes.</p></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i> TRAINER ACTION</div><ul><li>Start timer - 3 minutes</li><li>Have participants share with partner</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Task 3 Instructions:</p><ol><li>Share main project folder with a partner</li><li>Choose "Anyone with link can view"</li><li>For a subfolder inside, choose "Restricted - only you"</li><li>Note why different permissions make sense</li></ol><p class="script-heading">Why Different Permissions?</p><ul><li>Main folder: broad visibility for collaboration</li><li>Drafts subfolder: only author sees work-in-progress</li><li>Final folder: anyone can see completed work</li></ul><p>"This is the difference between \'sharing everything\' and \'sharing intentionally.\' Both are valid depending on context."</p></div></div>' },
            { title: "Slide 13: Pattern Recap", content: '<div class="w-full flex flex-col items-center justify-center text-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Pattern Recap</h2><div class="max-w-3xl"><div class="bg-gradient-to-br from-blue-900/30 to-slate-900/50 p-8 rounded-2xl border border-blue-500/30 mb-8"><p class="text-2xl md:text-3xl font-medium text-white leading-relaxed">"AI search means <span class="text-blue-400 font-bold">\'what\'</span> over <span class="text-purple-400 font-bold">\'where.\'</span> But good folder structure still helps when AI isn\'t available."</p></div><div class="bg-slate-800/50 p-6 rounded-xl border border-slate-700"><h3 class="font-bold text-lg mb-4 text-blue-400">Drive Organization Principles:</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-left"><div class="flex items-center gap-3"><span class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400 font-bold">1</span><p class="text-slate-300">Shallow hierarchy (max 3-4 levels)</p></div><div class="flex items-center gap-3"><span class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400 font-bold">2</span><p class="text-slate-300">Numbered folders (01, 02, 03)</p></div><div class="flex items-center gap-3"><span class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400 font-bold">3</span><p class="text-slate-300">Descriptive names with dates</p></div><div class="flex items-center gap-3"><span class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400 font-bold">4</span><p class="text-slate-300">Consistent structure across projects</p></div></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 13]***</div><div class="timing-box"><i class="fa-regular fa-clock text-slate-400"></i> <span class="time-range">0:32-0:34</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-star"></i>KEY MESSAGE</div><p class="key-message">"What" over "where" is the ONE thing. But folder structure still matters as backup.</p></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i> TRAINER ACTION</div><ul><li>Read the quote with emphasis</li><li>Review the four organization principles</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">The ONE Thing:</p><p>"AI search means \'what\' over \'where.\' But good folder structure still helps when AI isn\'t available."</p><p class="script-heading">Four Organization Principles:</p><ol><li>Shallow hierarchy (max 3-4 levels)</li><li>Numbered folders (01, 02, 03 for sorting)</li><li>Descriptive names with dates</li><li>Consistent structure across projects</li></ol><p>"AI is powerful, but it doesn\'t replace good habits. Both together is optimal."</p></div></div>' },
            { title: "Slide 14: Take-Away - Drive Organization System", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-6 gradient-text">Take-Away: Drive Organization System</h2><div class="w-full max-w-3xl"><div class="bg-slate-800 border border-slate-700 rounded-2xl overflow-hidden"><div class="bg-gradient-to-r from-blue-600 to-purple-600 p-4 text-center"><h3 class="text-xl font-bold">PROJECT FOLDER TEMPLATE</h3></div><div class="p-6 space-y-3 text-sm"><div class="bg-slate-900 p-3 rounded-lg"><p class="text-emerald-400 font-semibold mb-1">MASTER PRINCIPLES:</p><p class="text-slate-300">Number folders • Create Archive • Use YYYY-MM-DD dates • Star critical files • Review monthly</p></div><div class="bg-slate-900 p-3 rounded-lg"><p class="text-purple-400 font-semibold mb-2">Standard Project Structure:</p><div class="font-mono text-slate-400"><p>Project [Name] YYYY/</p><p class="ml-4">├── 00-Admin/ ← Contracts, setup</p><p class="ml-4">├── 01-Research/ ← Background</p><p class="ml-4">├── 02-Materials/ ← Assets, data</p><p class="ml-4">├── 03-Drafts/ ← Working docs</p><p class="ml-4">├── 04-Review/ ← Feedback</p><p class="ml-4">├── 05-Final/ ← Approved</p><p class="ml-4">└── 06-Archive/ ← Completed</p></div></div></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 14]***</div><div class="timing-box"><i class="fa-regular fa-clock text-slate-400"></i> <span class="time-range">0:34-0:36</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-star"></i>KEY MESSAGE</div><p class="key-message">Your take-away: the complete project folder template. Save this. Use it for every project.</p></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i> TRAINER ACTION</div><ul><li>Walk through the master principles</li><li>Review the folder structure template</li><li>Encourage screenshot or notes</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Master Principles:</p><ul><li>Number folders for alphabetical + chronological order</li><li>Create "Archive" folders for completed work</li><li>Use consistent date format: YYYY-MM-DD</li><li>Star critical files for quick access</li><li>Review monthly: Archive old, delete duplicates</li></ul><p class="script-heading">Standard Project Structure:</p><ul><li>00-Admin (contracts, setup)</li><li>01-Research (background, sources)</li><li>02-Materials (assets, data)</li><li>03-Drafts (working documents)</li><li>04-Review (feedback, iterations)</li><li>05-Final (approved deliverables)</li><li>06-Archive (completed records)</li></ul><p>"Use this template for every project. Consistency is the key."</p></div></div>' },
            { title: "Slide 15: Bridge to Module 7", content: '<div class="w-full flex flex-col items-center justify-center text-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Coming Up Next</h2><div class="max-w-3xl mb-8"><div class="bg-gradient-to-br from-blue-900/30 to-purple-900/30 p-8 rounded-2xl border border-purple-500/30"><p class="text-sm text-purple-400 uppercase tracking-wider mb-4">Module 7 Preview</p><h3 class="text-3xl font-bold mb-4">Automation with Gemini</h3><p class="text-xl text-slate-300 mb-6">Chaining AI commands to handle repetitive tasks automatically. Bringing everything together.</p><div class="flex items-center justify-center gap-4 text-slate-400"><span><i class="fa-regular fa-clock mr-2"></i>30 minutes</span><span class="text-purple-400">|</span><span><i class="fa-solid fa-graduation-cap mr-2"></i>Module 7 of 8</span></div></div></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700 max-w-2xl"><p class="text-lg text-slate-300 mb-3">Before next session, try this:</p><p class="text-slate-400">Clean up one project folder using the numbered structure. Notice how AI search makes retrieval easier.</p></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 15]***</div><div class="timing-box"><i class="fa-regular fa-clock text-slate-400"></i> <span class="time-range">0:36-0:38</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-star"></i>KEY MESSAGE</div><p class="key-message">Module 7 brings everything together: Automation with Gemini. Prompt chaining for compound tasks.</p></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i> TRAINER ACTION</div><ul><li>Preview Module 7 content</li><li>Remind participants to prepare</li><li>Close with summary</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Bridge to Module 7:</p><p>"Next module is where everything comes together: Automation with Gemini."</p><p class="script-heading">What You\'ll Learn:</p><ul><li>Identify automation opportunities in workflows</li><li>Write effective multi-step Gemini prompts</li><li>Build prompt chains for compound tasks</li><li>Create a personal automation playbook</li></ul><p class="script-heading">Preparation:</p><p>"Before next session: Clean up one project folder using our numbered structure. Notice how AI search makes retrieval easier. That awareness will help in Module 7."</p><p>"Great work today! See you in Module 7."</p></div></div>' }
        ];

        let currentSlide = 0;
        const totalSlides = courseData.length;

        function updateSlide() {
            const slide = courseData[currentSlide];
            document.getElementById('slide-info').innerHTML = '<h3 class="text-purple-300 font-bold text-lg mb-4">' + slide.title + '</h3>';
            document.getElementById('notes-content').innerHTML = slide.notes;
            document.getElementById('slideCounter').textContent = 'Slide ' + (currentSlide + 1) + ' / ' + totalSlides;
            document.getElementById('bannerSlide').textContent = currentSlide + 1;
            document.getElementById('bannerTotal').textContent = totalSlides;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;

            const previewContent = document.getElementById('preview-content');
            previewContent.innerHTML = slide.content;
            previewContent.style.fontSize = '12px';
            previewContent.style.lineHeight = '1.4';

            const aspectRatio = 16 / 9;
            const containerWidth = previewContent.parentElement.clientWidth;
            const containerHeight = previewContent.parentElement.clientHeight;

            let scale = 1;
            if (containerWidth && containerHeight) {
                const scaleX = containerWidth / 1600;
                const scaleY = containerHeight / (1600 / aspectRatio);
                scale = Math.min(scaleX, scaleY, 1);
            }

            previewContent.style.transform = 'scale(' + scale + ')';
            previewContent.style.width = '1600px';
            previewContent.style.height = (1600 / aspectRatio) + 'px';
            previewContent.style.maxWidth = 'none';

            channel.postMessage({ type: 'sync', index: currentSlide });
        }

        function nextSlide() { if (currentSlide < totalSlides - 1) { currentSlide++; updateSlide(); } }
        function prevSlide() { if (currentSlide > 0) { currentSlide--; updateSlide(); } }

        document.getElementById('nextBtn').addEventListener('click', nextSlide);
        document.getElementById('prevBtn').addEventListener('click', prevSlide);

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
        });

        var splitSlider = document.getElementById('splitSlider');
        var splitValue = document.getElementById('splitValue');
        splitSlider.addEventListener('input', function() {
            var val = splitSlider.value;
            splitValue.textContent = val + '%';
            document.getElementById('previewPane').style.height = val + '%';
            document.getElementById('notesPane').style.flex = '1';
        });

        window.addEventListener('resize', updateSlide);
        updateSlide();
    </script>
