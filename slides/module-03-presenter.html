        @media (min-width: 1024px) { .top-bar { flex-direction: row; padding: 15px 30px; gap: 0; } .brand { width: auto; justify-content: flex-start; margin-bottom: 0; } .split-control { display: flex; } .controls { width: auto; } }
        @media (max-width: 767px) { body { height: auto; min-height: 100vh; overflow-y: auto; } .main-container { flex-direction: column; height: auto; min-height: 80vh; } .preview-pane { height: 50px; min-height: 50px; padding: 4px; border-bottom: 1px solid #334155; flex: none; } .notes-pane { flex: 1; height: auto; min-height: calc(100vh - 150px); padding: 10px; overflow-y: auto; } }

        .controls button:hover { background-color: #4f46e5; }

        .main-container { display: flex; flex-direction: column; flex: 1; overflow-y: auto; }
        .preview-pane { flex: none; height: 45%; min-height: 35vh; padding: 15px; border-bottom: 1px solid #334155; display: flex; flex-direction: column; background-color: #0a0a0a; }

        .slide-cue-box { background: linear-gradient(135deg, #1e1e3a, #1e293b); border-left: 4px solid #a78bfa; padding: 12px 16px; margin-bottom: 16px; border-radius: 4px; }
        .timing-box { background-color: #1a1a2e; border-left: 4px solid #818cf8; padding: 10px 16px; margin-bottom: 16px; border-radius: 4px; display: flex; align-items: center; gap: 10px; }

        .guidance-box { background: linear-gradient(135deg, #1e1e3a, #1e293b); border-left: 4px solid #f59e0b; padding: 14px 18px; margin-bottom: 16px; border-radius: 4px; }
        .guidance-header { color: #f59e0b; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .guidance-box ul { margin: 0; padding-left: 20px; }
        .guidance-box li { color: #e2e8f0; margin-bottom: 4px; }
        .key-message-box { background: #1a1a2e; border-left: 4px solid #a78bfa; padding: 12px 16px; margin-bottom: 16px; border-radius: 4px; }
        .key-message-header { display: flex; align-items: center; margin-bottom: 8px; color: #a78bfa; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .key-message-header i { margin-right: 8px; }
        .key-message { color: #e2e8f0; font-weight: 500; }
        .trainer-notes-section { margin-top: 16px; }
        .notes-header { display: flex; align-items: center; margin-bottom: 8px; color: #f59e0b; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }

        .trainer-note { background: #2a1a00; border-left: 4px solid #f59e0b; padding: 12px 16px; margin-bottom: 6px; border-radius: 4px; color: #e2e8f0; font-size: 13px; line-height: 1.8; }
        .trainer-note .script-heading { color: #a78bfa; font-weight: 700; margin-top: 12px; margin-bottom: 6px; }
        .trainer-note .script-heading:first-child { margin-top: 0; }
        .trainer-note ul { margin: 8px 0; padding-left: 20px; list-style-type: disc; }
        .trainer-note ol { margin: 8px 0; padding-left: 20px; list-style-type: decimal; }

        .gradient-text { background: linear-gradient(135deg, #a78bfa, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .reference-desk { background: linear-gradient(135deg, #1e1e3a, #0f172a); border: 1px solid #a78bfa; border-radius: 8px; margin-top: 20px; overflow: hidden; }
        .reference-desk-header { background: #0f172a; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
        .reference-desk-header:hover { background: #1e293b; }

<body>

    </div>
    <div class="top-bar">
        <div class="brand">
            <i class="fa-solid fa-robot" style="color: #a78bfa; font-size: 20px; margin-right: 10px;"></i>

                    <li><div class="ref-item"><span class="ref-number">[1]</span>Google Docs Templates <a href="javascript:void(0)" onclick="openReferenceInAudience('https://support.google.com/docs/answer/1085292')" class="reference-link">Using Templates Guide</a></div></li>
                    <li><div class="ref-item"><span class="ref-number">[2]</span>Gemini in Docs <a href="javascript:void(0)" onclick="openReferenceInAudience('https://support.google.com/docs/answer/12693851')" class="reference-link">Gemini AI Features</a></div></li>
                </ul>

        </div>
    </div>
    <script>
        const channel = new BroadcastChannel('sync_module_3_ai-productivity');
        function openReferenceInAudience(url) { channel.postMessage({ type: 'open-tab-url', url: url }); }
        function toggleReferenceDesk() { document.getElementById('referenceContent').classList.toggle('open'); document.getElementById('referenceToggle').classList.toggle('open'); }

        const courseData = [
            { title: "Slide 1: Title - Module 3: Document Automation", content: '<div class="w-full flex flex-col items-center justify-center text-center"><div class="mb-6 px-4 py-1 rounded-full bg-purple-500/20 text-purple-400 text-sm font-semibold border border-purple-500/30">MODULE 3</div><h1 class="text-5xl md:text-7xl font-extrabold mb-6">Document Automation</h1><p class="text-2xl md:text-3xl text-slate-400 mb-8">Templates, Variables, and AI Content Generation</p><div class="flex items-center gap-4 text-slate-500 text-lg"><span><i class="fa-regular fa-clock mr-2"></i>30 min</span><span class="text-purple-400">|</span><span><i class="fa-solid fa-graduation-cap mr-2"></i>Module 3 of 8</span></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 1]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:00 - 0:03</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-bullseye"></i>KEY MESSAGE</div><div class="key-message">This module is about efficiency - using templates to automate repetitive document creation.</div></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Opening (0:00-0:03):</p><p>Welcome to Module 3: Document Automation.</p><p>Today we tackle the repetition problem - the time we spend recreating similar documents over and over. We\'ll learn to build templates that Gemini can fill instantly.</p><p>By the end, you\'ll have a personal template library that saves you hours every month.</p></div></div>' },
            { title: "Slide 2: Learning Objectives", content: '<div class="w-full flex flex-col items-center justify-center max-w-4xl"><h2 class="text-4xl font-bold mb-8 gradient-text">Learning Objectives</h2><div class="space-y-5 w-full"><div class="flex items-start gap-4 bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center flex-shrink-0"><span class="text-purple-400 font-bold">1</span></div><p class="text-xl font-semibold text-white">Create a reusable document template with placeholder markers</p></div><div class="flex items-start gap-4 bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center flex-shrink-0"><span class="text-purple-400 font-bold">2</span></div><p class="text-xl font-semibold text-white">Use Gemini to fill templates with variable content</p></div><div class="flex items-start gap-4 bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center flex-shrink-0"><span class="text-purple-400 font-bold">3</span></div><p class="text-xl font-semibold text-white">Generate 3 content variations (different tones/formats) from a single template</p></div><div class="flex items-start gap-4 bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center flex-shrink-0"><span class="text-purple-400 font-bold">4</span></div><p class="text-xl font-semibold text-white">Save and organize templates for ongoing use</p></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 2]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:03 - 0:05</span></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Objectives (0:03-0:05):</p><p>By the end of this session, you will be able to:</p><ol><li>Create reusable templates with placeholder markers - the foundation of automation</li><li>Use Gemini to fill templates - this is where AI shines</li><li>Generate multiple variations from one template - powerful for different audiences</li><li>Save and organize templates - building your personal automation library</li></ol></div></div>' },
            { title: "Slide 3: Session Overview", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Session Overview</h2><div class="w-full max-w-4xl"><div class="grid grid-cols-3 gap-4 mb-6"><div class="bg-blue-600/20 p-4 rounded-xl border-l-4 border-blue-400 text-center"><div class="text-3xl font-bold text-blue-400 mb-2">12</div><div class="text-sm text-slate-400 uppercase tracking-wide">Minutes</div><div class="text-lg font-semibold mt-2 text-blue-300">LEARN</div></div><div class="bg-emerald-600/20 p-4 rounded-xl border-l-4 border-emerald-400 text-center"><div class="text-3xl font-bold text-emerald-400 mb-2">18</div><div class="text-sm text-slate-400 uppercase tracking-wide">Minutes</div><div class="text-lg font-semibold mt-2 text-emerald-300">CONSOLIDATE</div></div><div class="bg-purple-600/20 p-4 rounded-xl border-l-4 border-purple-400 text-center"><div class="text-3xl font-bold text-purple-400 mb-2">2</div><div class="text-sm text-slate-400 uppercase tracking-wide">Minutes</div><div class="text-lg font-semibold mt-2 text-purple-300">COMPRESS</div></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 3]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:05 - 0:07</span></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i>TRAINER GUIDANCE</div><ul><li>Quick overview - they\'ll build templates during workshop</li><li>Emphasize the hands-on nature of consolidate phase</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Session Structure (0:05-0:07):</p><p>Here\'s how our 30 minutes break down:</p><ul><li><strong>Learn (12 min):</strong> Why templates save time, template structure, live demo</li><li><strong>Consolidate (18 min):</strong> Build your own template, fill it with AI, generate variations</li><li><strong>Compress (2 min):</strong> Take away your Template Starter Kit</li></ul></div></div>' },
            { title: "Slide 4: The Repetition Problem", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">The Repetition Problem</h2><div class="w-full max-w-4xl"><div class="overflow-hidden rounded-xl border border-slate-700 mb-6"><table class="w-full"><thead class="bg-slate-800"><tr><th class="text-left p-4 text-purple-400 font-semibold">Document Type</th><th class="text-left p-4 text-purple-400 font-semibold">Frequency</th><th class="text-left p-4 text-purple-400 font-semibold">Time to Create</th></tr></thead><tbody class="divide-y divide-slate-700"><tr class="bg-slate-800/30"><td class="p-4 text-slate-300">Meeting notes</td><td class="p-4 text-emerald-400">Daily</td><td class="p-4 text-slate-400">5-10 min</td></tr><tr><td class="p-4 text-slate-300">Status updates</td><td class="p-4 text-emerald-400">Weekly</td><td class="p-4 text-slate-400">15-20 min</td></tr><tr class="bg-slate-800/30"><td class="p-4 text-slate-300">Project briefs</td><td class="p-4 text-emerald-400">Per project</td><td class="p-4 text-slate-400">30-45 min</td></tr><tr><td class="p-4 text-slate-300">Client emails</td><td class="p-4 text-emerald-400">Multiple/day</td><td class="p-4 text-slate-400">5-10 min each</td></tr></tbody></table></div><div class="bg-red-900/20 p-5 rounded-xl border border-red-500/30 text-center"><p class="text-2xl font-bold text-red-400 mb-2">65 hours/year</p><p class="text-slate-400">Time lost creating 5 similar documents/week at 15 min each</p></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 4]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:07 - 0:10</span></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">The Repetition Problem (0:07-0:10):</p><p>Let\'s talk about the problem we\'re solving:</p><ul><li>Meeting notes - daily, 5-10 min each</li><li>Status updates - weekly, 15-20 min</li><li>Project briefs - per project, 30-45 min</li><li>Client emails - multiple per day, 5-10 min each</li></ul><p>Do the math: 5 documents at 15 min each, every week = 65 hours per year. That\'s more than a full work week!</p><p>The solution: Templates with AI.</p></div></div>' },
            { title: "Slide 5: The Template Solution", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">The Template Solution</h2><div class="w-full max-w-5xl"><div class="grid grid-cols-1 md:grid-cols-2 gap-8"><div class="bg-slate-800/50 p-6 rounded-xl border border-slate-700"><h3 class="font-bold text-xl text-blue-400 mb-4">Fixed Elements</h3><p class="text-slate-300 mb-3">Already written and consistent:</p><ul class="text-slate-400 space-y-2"><li>Headers and section titles</li><li>Standard text and instructions</li><li>Formatting and structure</li><li>Branding and logos</li></ul></div><div class="bg-slate-800/50 p-6 rounded-xl border border-slate-700"><h3 class="font-bold text-xl text-purple-400 mb-4">Variable Elements</h3><p class="text-slate-300 mb-3">Marked as placeholders:</p><ul class="text-slate-400 space-y-2"><li>[Client Name]</li><li>[DATE]</li><li>[AGENDA ITEMS]</li><li>[ACTION ITEMS]</li></ul></div></div><div class="mt-6 bg-emerald-900/20 p-5 rounded-xl border border-emerald-500/30 text-center"><p class="text-xl text-emerald-400 font-semibold">AI Enhancement: Gemini fills placeholders AND generates appropriate content</p></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 5]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:10 - 0:12</span></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">The Template Solution (0:10-0:12):</p><p>The template solution has two parts:</p><p><strong>Fixed Elements:</strong> Things that stay the same - headers, section titles, standard text, formatting, branding.</p><p><strong>Variable Elements:</strong> Things that change - marked with [BRACKETS] like [Client Name], [DATE], [AGENDA ITEMS].</p><p>The AI magic: Gemini can fill these placeholders AND generate appropriate content for each one. Build once, use forever, fill with AI.</p></div></div>' },
            { title: "Slide 6: Anatomy of a Template", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-6 gradient-text">Anatomy of an AI-Friendly Template</h2><div class="w-full max-w-4xl"><div class="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden"><div class="bg-gradient-to-r from-purple-600 to-blue-600 p-3 text-center"><p class="font-bold text-sm">TEMPLATE COMPONENTS</p></div><div class="p-5 text-sm space-y-4"><div class="border-b border-slate-700 pb-3"><p class="text-purple-400 font-semibold mb-1">HEADER (Fixed)</p><p class="text-slate-400">[Company Logo] | Document Type: [TYPE] | Date: [DATE]</p></div><div class="border-b border-slate-700 pb-3"><p class="text-purple-400 font-semibold mb-1">CONTENT (Variable)</p><p class="text-slate-400">## [TOPIC/HEADER]</p><p class="text-slate-400">[Variable content - AI fills this]</p><p class="text-slate-400 mt-2">## Key Points</p><p class="text-slate-400">• [Point 1 - AI generates]</p><p class="text-slate-400">• [Point 2 - AI generates]</p></div><div><p class="text-purple-400 font-semibold mb-1">FOOTER (Fixed)</p><p class="text-slate-400">Author: [YOUR NAME] | Version 1.0 | [DATE]</p></div></div></div><div class="mt-4 bg-yellow-900/20 p-4 rounded-xl border border-yellow-500/30"><p class="text-yellow-400 font-semibold mb-1"><i class="fa-solid fa-lightbulb mr-2"></i>Variable Marker Conventions:</p><p class="text-slate-300 text-sm"><span class="text-purple-400">[BRACKETS]</span> = Replace | <span class="text-purple-400">[UPPER CASE]</span> = Auto-fill | <span class="text-purple-400">[TASK/ACTION]</span> = AI generates</p></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 6]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:12 - 0:16</span></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Anatomy of a Template (0:12-0:16):</p><p>Show them the structure of an AI-friendly template:</p><ul><li><strong>Header (Fixed):</strong> Logo, document type, date - always the same format</li><li><strong>Content (Variable):</strong> Topic headers, bullet points marked with [BRACKETS]</li><li><strong>Footer (Fixed):</strong> Author, version, date - consistent across all docs</li></ul><p>Key convention: Mark variables with [BRACKETS]. Gemini learns to recognize these as things to fill.</p></div></div>' },
            { title: "Slide 7: Effective vs. Weak Prompts", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Effective vs. Weak Prompts</h2><div class="w-full max-w-5xl"><div class="grid grid-cols-1 md:grid-cols-2 gap-6"><div class="bg-red-900/20 p-6 rounded-xl border-2 border-red-500/50"><div class="flex items-center gap-3 mb-4"><div class="w-10 h-10 rounded-full bg-red-500/20 flex items-center justify-center"><i class="fa-solid fa-xmark text-red-400 text-xl"></i></div><h3 class="font-bold text-xl text-red-400">Weak Prompt</h3></div><div class="bg-slate-800 p-4 rounded-lg"><p class="text-slate-400 text-lg">"Write meeting notes"</p></div><p class="text-red-400 mt-4 text-sm">Too vague - AI doesn\'t know context, audience, or specifics</p></div><div class="bg-emerald-900/20 p-6 rounded-xl border-2 border-emerald-500/50"><div class="flex items-center gap-3 mb-4"><div class="w-10 h-10 rounded-full bg-emerald-500/20 flex items-center justify-center"><i class="fa-solid fa-check text-emerald-400 text-xl"></i></div><h3 class="font-bold text-xl text-emerald-400">Strong Prompt</h3></div><div class="bg-slate-800 p-4 rounded-lg"><p class="text-emerald-400 text-sm leading-relaxed">"Write meeting notes for a 30-minute standup with 5 team members. Include: attendance, yesterday\'s accomplishments, today\'s priorities, blockers."</p></div><p class="text-emerald-400 mt-4 text-sm">Specific context = accurate, useful output</p></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 7]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:16 - 0:19</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-bullseye"></i>KEY MESSAGE</div><div class="key-message">The more context you give Gemini, the better the output. Always include: who, what, when, why.</div></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Effective Prompts (0:16-0:19):</p><p>Show them the difference between weak and strong prompts:</p><p><strong>Weak:</strong> "Write meeting notes" - no context, AI has to guess</p><p><strong>Strong:</strong> "Write meeting notes for a 30-minute standup with 5 team members. Include: attendance, yesterday\'s accomplishments, today\'s priorities, blockers." - specific, detailed, useful output</p><p>Rule: Always give Gemini WHO, WHAT, WHEN, WHY. The more context, the better the output.</p></div></div>' },
            { title: "Slide 8: Live Demonstration", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Live Demonstration</h2><div class="w-full max-w-5xl"><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700"><h3 class="font-bold text-lg mb-3"><span class="text-blue-400 mr-2">1</span>Open Template Folder</h3><p class="text-sm text-slate-400">Navigate to Drive - Open Meeting Notes Template</p></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700"><h3 class="font-bold text-lg mb-3"><span class="text-purple-400 mr-2">2</span>Show Template Structure</h3><p class="text-sm text-slate-400">Highlight placeholders, explain fixed vs. variable</p></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700"><h3 class="font-bold text-lg mb-3"><span class="text-emerald-400 mr-2">3</span>Fill Template with AI</h3><p class="text-sm text-slate-400">Ctrl+Shift+M - Paste detailed prompt - Generate</p></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700"><h3 class="font-bold text-lg mb-3"><span class="text-yellow-400 mr-2">4</span>Generate Variations</h3><p class="text-sm text-slate-400">Select section - Prompt for 3 tones</p></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700 md:col-span-2"><h3 class="font-bold text-lg mb-3"><span class="text-red-400 mr-2">5</span>Save as New Document</h3><p class="text-sm text-slate-400">File - Make a copy - Rename with date/context - Demonstrate template preservation</p></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 8]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:19 - 0:23</span></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i>TRAINER GUIDANCE</div><ul><li>Demo all 5 actions LIVE if possible</li><li>Think-aloud as you perform each step</li><li>If environment isn\'t ready, use screenshots</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Demo (0:19-0:23):</p><p>Watch me perform all five template actions:</p><ol><li><strong>Open Template Folder:</strong> Navigate to Drive, open pre-created template</li><li><strong>Show Structure:</strong> Point out placeholder markers, fixed vs. variable sections</li><li><strong>Fill with AI:</strong> Ctrl+Shift+M, paste detailed prompt, show generation</li><li><strong>Generate Variations:</strong> Take one section, prompt for formal/casual/bullet formats</li><li><strong>Save as Copy:</strong> File - Make a copy, rename properly, show template stays intact</li></ol><p>Questions? Now it\'s YOUR turn.</p></div></div>' },
            { title: "Slide 9: Workshop - Build Template", content: '<div class="w-full flex flex-col items-center justify-center"><div class="mb-4 px-4 py-1 rounded-full bg-emerald-500/20 text-emerald-400 text-sm font-semibold border border-emerald-500/30">WORKSHOP</div><h2 class="text-4xl font-bold mb-4">Task 1: Build Your Meeting Notes Template</h2><p class="text-xl text-slate-400 mb-6">Time: 5 minutes</p><div class="w-full max-w-4xl"><div class="bg-slate-800/50 p-5 rounded-xl border border-emerald-500/30 mb-4"><h3 class="font-bold text-emerald-400 mb-3">Create this structure:</h3><div class="bg-slate-900 p-4 rounded-lg text-sm font-mono text-slate-300 space-y-1"><p>MEETING NOTES TEMPLATE</p><p>Date: [DATE] | Type: [TYPE] | Attendees: [NAMES]</p><p>AGENDA</p><p>1. [AGENDA ITEM 1]</p><p>2. [AGENDA ITEM 2]</p><p>DISCUSSION NOTES [AI fills]</p><p>KEY DECISIONS - [DECISION 1]</p><p>ACTION ITEMS - [ACTION] - Owner: [NAME]</p><p>NEXT MEETING: [DATE]</p></div></div><div class="flex items-center justify-center gap-4"><div class="bg-purple-900/20 px-4 py-2 rounded-lg border border-purple-500/30"><p class="text-purple-400 text-sm"><i class="fa-solid fa-bold mr-1"></i>Bold placeholders</p></div><div class="bg-purple-900/20 px-4 py-2 rounded-lg border border-purple-500/30"><p class="text-purple-400 text-sm"><i class="fa-solid fa-heading mr-1"></i>Use Heading 2</p></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 9]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:23 - 0:28</span></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i>TRAINER GUIDANCE</div><ul><li>5 minutes for this task</li><li>Circulate and help participants</li><li>Make sure everyone creates the template structure</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Task 1 Instructions (0:23-0:28):</p><p>"You have 5 minutes to build your meeting notes template."</p><ol><li>Create new Google Doc, title it "My Meeting Notes Template"</li><li>Build the structure shown on screen - use Heading 2 for section titles</li><li>Bold all placeholder markers in [BRACKETS]</li><li>Save to your Drive</li></ol><p>Call time at 5 minutes.</p></div></div>' },
            { title: "Slide 10: Workshop - Fill Template", content: '<div class="w-full flex flex-col items-center justify-center"><div class="mb-4 px-4 py-1 rounded-full bg-emerald-500/20 text-emerald-400 text-sm font-semibold border border-emerald-500/30">WORKSHOP</div><h2 class="text-4xl font-bold mb-4">Task 2: Fill Template Using AI</h2><p class="text-xl text-slate-400 mb-6">Time: 5 minutes</p><div class="w-full max-w-4xl"><div class="bg-slate-800/50 p-5 rounded-xl border border-emerald-500/30 mb-4"><ol class="space-y-3"><li class="flex items-start gap-3"><div class="w-7 h-7 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold text-sm">1</span></div><p class="text-slate-200">Make a copy of your template</p></li><li class="flex items-start gap-3"><div class="w-7 h-7 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold text-sm">2</span></div><p class="text-slate-200">Open Gemini: <span class="text-purple-400 font-mono">Ctrl+Shift+M</span></p></li><li class="flex items-start gap-3"><div class="w-7 h-7 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold text-sm">3</span></div><p class="text-slate-200">Paste the prompt below</p></li></ol></div><div class="bg-slate-900 p-4 rounded-xl border border-slate-700 text-sm"><p class="text-purple-400 font-semibold mb-2">Fill this meeting notes template for:</p><p class="text-slate-300 mb-1">- Date: May 27, 2026</p><p class="text-slate-300 mb-1">- Meeting Type: Weekly Team Standup</p><p class="text-slate-300 mb-1">- Attendees: Alex, Jordan, Taylor, Morgan</p><p class="text-slate-300">- Generate realistic notes, 2 decisions, 3 action items</p></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 10]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:28 - 0:33</span></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i>TRAINER GUIDANCE</div><ul><li>5 minutes for this task</li><li>Circulate and help those who are stuck</li><li>Make sure everyone sends at least one AI prompt</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Task 2 Instructions (0:28-0:33):</p><p>"Now fill your template with AI - 5 minutes."</p><ol><li>Make a copy of your template (File - Make a copy)</li><li>Open Gemini: Ctrl+Shift+M</li><li>Copy and paste the prompt from the screen</li><li>Review the AI-generated content</li><li>Adjust anything that doesn\'t match</li></ol><p>Call time at 5 minutes.</p></div></div>' },
            { title: "Slide 11: Workshop - Save and Organize", content: '<div class="w-full flex flex-col items-center justify-center"><div class="mb-4 px-4 py-1 rounded-full bg-emerald-500/20 text-emerald-400 text-sm font-semibold border border-emerald-500/30">WORKSHOP</div><h2 class="text-4xl font-bold mb-4">Task 3: Save and Organize</h2><p class="text-xl text-slate-400 mb-6">Time: 2 minutes</p><div class="w-full max-w-3xl"><div class="bg-slate-800/50 p-6 rounded-xl border border-emerald-500/30"><div class="space-y-4"><div class="flex items-start gap-4"><div class="w-10 h-10 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold">1</span></div><div><p class="text-lg text-slate-200 font-semibold">Save with meaningful filename</p><p class="text-slate-400 text-sm">Format: "Standup Notes - 2026-05-27"</p></div></div><div class="flex items-start gap-4"><div class="w-10 h-10 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold">2</span></div><div><p class="text-lg text-slate-200 font-semibold">Create a template folder in Drive</p><p class="text-slate-400 text-sm">Name it: "My Templates"</p></div></div><div class="flex items-start gap-4"><div class="w-10 h-10 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold">3</span></div><div><p class="text-lg text-slate-200 font-semibold">Move template to template folder</p><p class="text-slate-400 text-sm">Keep template pristine - work on copies</p></div></div></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 11]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:33 - 0:35</span></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i>TRAINER GUIDANCE</div><ul><li>2 minutes only - this is organizational</li><li>Help anyone who doesn\'t know how to make a folder</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Task 3 Instructions (0:33-0:35):</p><ol><li>Save your filled document with a meaningful name: "Standup Notes - 2026-05-27"</li><li>Create a folder in Drive called "My Templates"</li><li>Move your template (not the filled copy) to that folder</li><li>Key principle: Always work on COPIES, keep the template pristine</li></ol></div></div>' },
            { title: "Slide 12: Variation Exercise", content: '<div class="w-full flex flex-col items-center justify-center"><div class="mb-4 px-4 py-1 rounded-full bg-purple-500/20 text-purple-400 text-sm font-semibold border border-purple-500/30">VARIATION EXERCISE</div><h2 class="text-4xl font-bold mb-8">Generate Content Variations</h2><p class="text-xl text-slate-400 mb-8">Time: 3 minutes</p><div class="w-full max-w-4xl"><div class="bg-slate-800/50 p-6 rounded-xl border border-purple-500/30 mb-6"><p class="text-slate-300 mb-4">Take your filled "Key Decisions" section and generate 3 variations:</p><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><div class="bg-blue-900/20 p-4 rounded-lg border border-blue-500/30"><p class="text-blue-400 font-semibold mb-2">1. Formal Executive</p><p class="text-xs text-slate-400">"Rewrite as formal executive briefing"</p></div><div class="bg-purple-900/20 p-4 rounded-lg border border-purple-500/30"><p class="text-purple-400 font-semibold mb-2">2. Bullet Summary</p><p class="text-xs text-slate-400">"Summarize as 2-bullet update"</p></div><div class="bg-emerald-900/20 p-4 rounded-lg border border-emerald-500/30"><p class="text-emerald-400 font-semibold mb-2">3. Social Media</p><p class="text-xs text-slate-400">"Convert to social post (100 words)"</p></div></div></div><div class="bg-purple-900/20 p-4 rounded-xl border border-purple-500/30 text-center"><p class="text-purple-300 font-semibold">Which tone was most useful? When would you use each?</p></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 12]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:35 - 0:38</span></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i>TRAINER GUIDANCE</div><ul><li>3 minutes for variation exercise</li><li>Have participants share their favorite variation</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Variation Exercise (0:35-0:38):</p><p>"Take your filled Key Decisions section and try these three variations:"</p><ol><li>Formal executive briefing style</li><li>2-bullet summary</li><li>Social media post (100 words)</li></ol><p>Discuss: Which tone was most useful? When would you use each format in your work?</p></div></div>' },
            { title: "Slide 13: Pattern Recap", content: '<div class="w-full flex flex-col items-center justify-center text-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Pattern Recap</h2><div class="max-w-3xl"><div class="bg-gradient-to-br from-purple-900/30 to-slate-900/50 p-8 rounded-2xl border border-purple-500/30 mb-8"><p class="text-2xl md:text-3xl font-medium text-white leading-relaxed">"Templates + AI = Consistent documents, generated instantly. <span class="text-emerald-400 font-bold">Build once, use forever, fill with AI.</span>"</p></div><div class="bg-slate-800/50 p-6 rounded-xl border border-slate-700"><h3 class="font-bold text-lg mb-4 text-purple-400">Template Building Rules:</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-left"><div class="flex items-center gap-3"><span class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400 font-bold">1</span><p class="text-slate-300">Mark every variable with [BRACKETS]</p></div><div class="flex items-center gap-3"><span class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400 font-bold">2</span><p class="text-slate-300">Give AI context (who, what, when, why)</p></div><div class="flex items-center gap-3"><span class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400 font-bold">3</span><p class="text-slate-300">Preview AI output before accepting</p></div><div class="flex items-center gap-3"><span class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400 font-bold">4</span><p class="text-slate-300">Save each output with meaningful filename</p></div></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 13]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:38 - 0:39</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-bullseye"></i>KEY MESSAGE</div><div class="key-message">The ONE thing to remember: Templates + AI = automation. Build once, use forever.</div></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Pattern Recap (0:38-0:39):</p><p>Read the quote on screen:</p><p><em>"Templates + AI = Consistent documents, generated instantly. Build once, use forever, fill with AI."</em></p><p>Four rules to remember:</p><ol><li>Mark variables with [BRACKETS]</li><li>Give context to AI</li><li>Preview before accepting</li><li>Save with good filenames</li></ol></div></div>' },
            { title: "Slide 14: Take-Away - Template Starter Kit", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-6 gradient-text">Take-Away: Template Starter Kit</h2><p class="text-lg text-slate-400 mb-6">5 templates to start your automation library</p><div class="w-full max-w-3xl"><div class="bg-slate-800 border border-slate-700 rounded-2xl overflow-hidden"><div class="bg-gradient-to-r from-purple-600 to-blue-600 p-4 text-center"><h3 class="text-xl font-bold">MY TEMPLATE STARTER KIT</h3></div><div class="p-6 space-y-4"><div class="flex items-start gap-4 p-4 bg-slate-700/50 rounded-lg"><span class="text-2xl">📋</span><div><p class="font-bold text-white">1. Meeting Notes</p><p class="text-sm text-slate-400">Pre-filled agenda, action items, decision tracker</p></div></div><div class="flex items-start gap-4 p-4 bg-slate-700/50 rounded-lg"><span class="text-2xl">📊</span><div><p class="font-bold text-white">2. Status Update</p><p class="text-sm text-slate-400">Weekly/monthly progress with metrics placeholders</p></div></div><div class="flex items-start gap-4 p-4 bg-slate-700/50 rounded-lg"><span class="text-2xl">📧</span><div><p class="font-bold text-white">3. Client Email</p><p class="text-sm text-slate-400">Opening, body, closing with tone markers</p></div></div><div class="flex items-start gap-4 p-4 bg-slate-700/50 rounded-lg"><span class="text-2xl">📝</span><div><p class="font-bold text-white">4. Project Brief</p><p class="text-sm text-slate-400">Objective, scope, timeline, resources</p></div></div><div class="flex items-start gap-4 p-4 bg-slate-700/50 rounded-lg"><span class="text-2xl">✅</span><div><p class="font-bold text-white">5. Checklist</p><p class="text-sm text-slate-400">Repeating tasks with checkboxes and assignees</p></div></div></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 14]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:39 - 0:40</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-bullseye"></i>KEY MESSAGE</div><div class="key-message">This is the compression artifact - 5 templates to build your automation library.</div></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Template Starter Kit (0:39-0:40):</p><p>"This is your take-away from Module 3. Screenshot or photograph this list."</p><p>Your homework: Build at least ONE of these templates before next session.</p><p>See you in Module 4!"</p></div></div>' },

        ];

        let currentSlide = 0;
        const totalSlides = courseData.length;

        function updateSlide() {
            const slide = courseData[currentSlide];
            document.getElementById('slide-info').innerHTML = '<h3 class="text-purple-300 font-bold text-lg mb-4">' + slide.title + '</h3>';
            document.getElementById('notes-content').innerHTML = slide.notes;
            document.getElementById('slideCounter').textContent = 'Slide ' + (currentSlide + 1) + ' / ' + totalSlides;
            document.getElementById('bannerSlide').textContent = currentSlide + 1;
            document.getElementById('bannerTotal').textContent = totalSlides;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;

            const previewContent = document.getElementById('preview-content');
            previewContent.innerHTML = slide.content;
            previewContent.style.fontSize = '12px';
            previewContent.style.lineHeight = '1.4';

            const aspectRatio = 16 / 9;
            const containerWidth = previewContent.parentElement.clientWidth;
            const containerHeight = previewContent.parentElement.clientHeight;

            let scale = 1;
            if (containerWidth && containerHeight) {
                const scaleX = containerWidth / 1600;
                const scaleY = containerHeight / (1600 / aspectRatio);
                scale = Math.min(scaleX, scaleY, 1);
            }

            previewContent.style.transform = 'scale(' + scale + ')';
            previewContent.style.width = '1600px';
            previewContent.style.height = (1600 / aspectRatio) + 'px';
            previewContent.style.maxWidth = 'none';

            channel.postMessage({ type: 'sync', index: currentSlide });
        }

        function nextSlide() { if (currentSlide < totalSlides - 1) { currentSlide++; updateSlide(); } }
        function prevSlide() { if (currentSlide > 0) { currentSlide--; updateSlide(); } }

        document.getElementById('nextBtn').addEventListener('click', nextSlide);
        document.getElementById('prevBtn').addEventListener('click', prevSlide);

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
        });

        var splitSlider = document.getElementById('splitSlider');
        var splitValue = document.getElementById('splitValue');
        splitSlider.addEventListener('input', function() {
            var val = splitSlider.value;
            splitValue.textContent = val + '%';
            document.getElementById('previewPane').style.height = val + '%';
            document.getElementById('notesPane').style.flex = '1';
        });

        window.addEventListener('resize', updateSlide);
        updateSlide();
    </script>
