    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .top-bar { background-color: #1e293b; border-bottom: 1px solid #334155; padding: 10px 15px; display: flex; flex-direction: column; gap: 10px; align-items: center; z-index: 10; }

        .brand { display: flex; align-items: center; width: 100%; justify-content: center; margin-bottom: 10px; }
        .split-control { display: none; }
        .controls { display: flex; gap: 10px; width: 100%; justify-content: center; align-items: center; }
        @media (min-width: 1024px) { .top-bar { flex-direction: row; padding: 15px 30px; gap: 0; } .brand { width: auto; justify-content: flex-start; margin-bottom: 0; } .split-control { display: flex; } .controls { width: auto; } }
        @media (max-width: 767px) { body { height: auto; min-height: 100vh; overflow-y: auto; } .main-container { flex-direction: column; height: auto; min-height: 80vh; } .preview-pane { height: 50px; min-height: 50px; padding: 4px; border-bottom: 1px solid #334155; flex: none; } .notes-pane { flex: 1; height: auto; min-height: calc(100vh - 150px); padding: 10px; overflow-y: auto; } }
        .controls button { background-color: #6366f1; color: #fff; border: none; padding: 10px 24px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .controls button:hover { background-color: #4f46e5; }
        .controls button:disabled { background-color: #334155; color: #64748b; cursor: not-allowed; }
        .status { font-family: monospace; font-size: 16px; background: #000; padding: 8px 16px; border-radius: 6px; border: 1px solid #334155; white-space: nowrap; }
        .main-container { display: flex; flex-direction: column; flex: 1; overflow-y: auto; }
        .preview-pane { flex: none; height: 45%; min-height: 35vh; padding: 15px; border-bottom: 1px solid #334155; display: flex; flex-direction: column; background-color: #0a0a0a; }
        .preview-box { flex: 1; background: #1e293b; border-radius: 8px; border: 2px solid #334155; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 200px; }
        .preview-content-wrapper { width: 100%; height: 100%; transform-origin: center center; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .notes-pane { flex: 1; min-height: 35vh; padding: 20px; background-color: #1e293b; overflow-y: auto; }

        .slide-cue-box { background: linear-gradient(135deg, #1e1e3a, #1e293b); border-left: 4px solid #a78bfa; padding: 12px 16px; margin-bottom: 16px; border-radius: 4px; }
        .timing-box { background-color: #1a1a2e; border-left: 4px solid #818cf8; padding: 10px 16px; margin-bottom: 16px; border-radius: 4px; display: flex; align-items: center; gap: 10px; }
        .timing-box .time-range { color: #c084fc; font-weight: 600; font-size: 15px; }
        .script-text { color: #e2e8f0; background: #0f172a; padding: 14px 16px; border-radius: 6px; line-height: 1.7; }
        .guidance-box { background: linear-gradient(135deg, #1e1e3a, #1e293b); border-left: 4px solid #f59e0b; padding: 14px 18px; margin-bottom: 16px; border-radius: 4px; }
        .guidance-header { color: #f59e0b; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .guidance-box ul { margin: 0; padding-left: 20px; }
        .guidance-box li { color: #e2e8f0; margin-bottom: 4px; }
        .key-message-box { background: #1a1a2e; border-left: 4px solid #a78bfa; padding: 12px 16px; margin-bottom: 16px; border-radius: 4px; }
        .key-message-header { display: flex; align-items: center; margin-bottom: 8px; color: #a78bfa; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .key-message-header i { margin-right: 8px; }
        .key-message { color: #e2e8f0; font-weight: 500; }
        .trainer-notes-section { margin-top: 16px; }
        .notes-header { display: flex; align-items: center; margin-bottom: 8px; color: #f59e0b; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .notes-header i { margin-right: 8px; }
        .trainer-note { background: #2a1a00; border-left: 4px solid #f59e0b; padding: 12px 16px; margin-bottom: 6px; border-radius: 4px; color: #e2e8f0; font-size: 13px; line-height: 1.8; }
        .trainer-note .script-heading { color: #a78bfa; font-weight: 700; margin-top: 12px; margin-bottom: 6px; }
        .trainer-note .script-heading:first-child { margin-top: 0; }
        .trainer-note ul { margin: 8px 0; padding-left: 20px; list-style-type: disc; }
        .trainer-note ol { margin: 8px 0; padding-left: 20px; list-style-type: decimal; }
        .trainer-note li { margin-bottom: 4px; }
        .trainer-note p { margin: 8px 0; }
        .gradient-text { background: linear-gradient(135deg, #a78bfa, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .reference-desk { background: linear-gradient(135deg, #1e1e3a, #0f172a); border: 1px solid #a78bfa; border-radius: 8px; margin-top: 20px; overflow: hidden; }
        .reference-desk-header { background: #0f172a; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
        .reference-desk-header:hover { background: #1e293b; }
        .reference-desk-title { display: flex; align-items: center; gap: 8px; color: #a78bfa; font-weight: 700; font-size: 14px; }
        .reference-desk-toggle { color: #94a3b8; transition: transform 0.3s ease; }
        .reference-desk-toggle.open { transform: rotate(180deg); }
        .reference-desk-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; background: #0f172a; }
        .reference-desk-content.open { max-height: 600px; overflow-y: auto; }
        .reference-list { padding: 16px; list-style: none; margin: 0; }
        .reference-list li { padding: 10px 0; border-bottom: 1px solid #334155; }
        .reference-item { font-size: 13px; line-height: 1.6; color: #e2e8f0; }
        .reference-item .ref-number { color: #a78bfa; font-weight: 700; margin-right: 8px; }
        .reference-link { color: #60a5fa; text-decoration: underline; cursor: pointer; transition: color 0.2s; }
        .reference-link:hover { color: #93c5fd; }
    </style>
</head>
<body>
    <div class="module-banner">
        <div class="flex items-center gap-4">
            <span class="text-2xl font-bold">Module 4</span>
            <span class="text-purple-200">AI-Powered Research</span>
        </div>
        <div class="text-xl font-mono bg-purple-800 px-4 py-1 rounded-lg">Slide <span id="bannerSlide">1</span> of <span id="bannerTotal">15</span></div>
    </div>
    <div class="top-bar">
        <div class="brand">
            <i class="fa-solid fa-robot" style="color: #a78bfa; font-size: 20px; margin-right: 10px;"></i>
            <span style="font-size: 18px; font-weight: bold;">Presenter View</span>
        </div>
        <div class="split-control" style="display: flex; align-items: center; gap: 10px; color: #94a3b8; font-size: 14px; background: #000; padding: 8px 16px; border-radius: 6px; border: 1px solid #334155;">
            <label for="splitSlider"><i class="fa-solid fa-left-right text-purple-400"></i> Audience:</label>

            <button id="prevBtn"><i class="fa-solid fa-chevron-left"></i> Prev</button>

        </div>
    </div>
    <div class="main-container" id="mainContainer">

                <div class="preview-content-wrapper text-slate-100" id="preview-content"></div>

            </div>

                <ul class="reference-list">
                    <li><div class="ref-item"><span class="ref-number">[1]</span>Google Gemini <a href="javascript:void(0)" onclick="openReferenceInAudience('https://gemini.google.com')" class="reference-link">gemini.google.com</a></div></li>
                    <li><div class="ref-item"><span class="ref-number">[2]</span>Gemini in Google Docs <a href="javascript:void(0)" onclick="openReferenceInAudience('https://support.google.com/docs/answer/12693851')" class="reference-link">AI Features Guide</a></div></li>
                </ul>
            </div>
        </div>
    </div>
    <script>
        const channel = new BroadcastChannel('sync_module_4_ai-productivity');
        function openReferenceInAudience(url) { channel.postMessage({ type: 'open-tab-url', url: url }); }
        function toggleReferenceDesk() { document.getElementById('referenceContent').classList.toggle('open'); document.getElementById('referenceToggle').classList.toggle('open'); }
        const courseData = [
            { title: "Slide 1: Title - Module 4: AI-Powered Research", content: '<div class="w-full flex flex-col items-center justify-center text-center"><div class="mb-6 px-4 py-1 rounded-full bg-purple-500/20 text-purple-400 text-sm font-semibold border border-purple-500/30">MODULE 4</div><h1 class="text-5xl md:text-7xl font-extrabold mb-6">AI-Powered Research</h1><p class="text-2xl md:text-3xl text-slate-400 mb-8">Synthesize, Extract, and Analyze with Gemini</p><div class="flex items-center gap-4 text-slate-500 text-lg"><span><i class="fa-regular fa-clock mr-2"></i>30 min</span><span class="text-purple-400">|</span><span><i class="fa-solid fa-graduation-cap mr-2"></i>Module 4 of 8</span></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 1]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:00 - 0:03</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-bullseye"></i>KEY MESSAGE</div><div class="key-message">This module transforms how you process information - AI synthesizes at speed, you verify for accuracy.</div></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Opening (0:00-0:03):</p><p>Welcome to Module 4: AI-Powered Research.</p><p>Today we tackle the information overload problem - the time we spend reading, identifying key information, comparing, and synthesizing multiple sources.</p><p>We will learn a research workflow that uses Gemini to accelerate the heavy lifting while keeping you in control of quality and accuracy.</p><p>By the end, you will have a repeatable process for synthesizing research 10x faster.</p></div></div>' },
            { title: "Slide 2: Learning Objectives", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Learning Objectives</h2><div class="space-y-5 w-full max-w-4xl"><div class="flex items-start gap-4 bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center flex-shrink-0"><span class="text-purple-400 font-bold">1</span></div><p class="text-xl font-semibold text-white">Use Gemini to extract and summarize information from source materials</p></div><div class="flex items-start gap-4 bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center flex-shrink-0"><span class="text-purple-400 font-bold">2</span></div><p class="text-xl font-semibold text-white">Compare and contrast multiple sources using AI</p></div><div class="flex items-start gap-4 bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center flex-shrink-0"><span class="text-purple-400 font-bold">3</span></div><p class="text-xl font-semibold text-white">Generate structured research outputs (briefs, summaries, bullet points)</p></div><div class="flex items-start gap-4 bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center flex-shrink-0"><span class="text-purple-400 font-bold">4</span></div><p class="text-xl font-semibold text-white">Cite and reference AI-synthesized information appropriately</p></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 2]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:03 - 0:05</span></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Learning Objectives (0:03-0:05):</p><p>By the end of this session, you will be able to:</p><ol><li><strong>Extract</strong> - Pull key information from documents quickly using AI</li><li><strong>Compare</strong> - Analyze multiple sources side-by-side to identify agreements and conflicts</li><li><strong>Generate</strong> - Create structured outputs like briefs, summaries, and bullet points</li><li><strong>Cite</strong> - Properly reference AI-synthesized information</li></ol><p>These four skills form a complete research workflow you can use daily.</p></div></div>' },
            { title: "Slide 3: Session Overview", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Session Overview</h2><div class="w-full max-w-4xl"><div class="grid grid-cols-3 gap-4 mb-6"><div class="bg-blue-600/20 p-4 rounded-xl border-l-4 border-blue-400 text-center"><div class="text-3xl font-bold text-blue-400 mb-2">12</div><div class="text-sm text-slate-400 uppercase tracking-wide">Minutes</div><div class="text-lg font-semibold mt-2 text-blue-300">LEARN</div></div><div class="bg-emerald-600/20 p-4 rounded-xl border-l-4 border-emerald-400 text-center"><div class="text-3xl font-bold text-emerald-400 mb-2">18</div><div class="text-sm text-slate-400 uppercase tracking-wide">Minutes</div><div class="text-lg font-semibold mt-2 text-emerald-300">CONSOLIDATE</div></div><div class="bg-purple-600/20 p-4 rounded-xl border-l-4 border-purple-400 text-center"><div class="text-3xl font-bold text-purple-400 mb-2">2</div><div class="text-sm text-slate-400 uppercase tracking-wide">Minutes</div><div class="text-lg font-semibold mt-2 text-purple-300">COMPRESS</div></div></div><div class="bg-slate-800/50 p-6 rounded-xl border border-slate-700"><div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm"><div><p class="text-purple-400 font-semibold mb-2">LEARN Phase</p><ul class="text-slate-400 space-y-1"><li>Research workflow fundamentals</li><li>Gemini synthesis capabilities</li><li>Live demonstration</li></ul></div><div><p class="text-emerald-400 font-semibold mb-2">CONSOLIDATE Phase</p><ul class="text-slate-400 space-y-1"><li>Research synthesis task</li><li>Peer comparison exercise</li><li>Share-back and debrief</li></ul></div><div><p class="text-purple-400 font-semibold mb-2">COMPRESS Phase</p><ul class="text-slate-400 space-y-1"><li>Pattern recap</li><li>Research workflow automation</li><li>Bridge to Module 5</li></ul></div></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 3]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:05 - 0:07</span></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i>TRAINER GUIDANCE</div><ul><li>Quick overview of the 30-minute structure</li><li>Emphasize the hands-on consolidate phase where they do the research</li><li>Tell them they need 3 articles for the workshop</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Session Structure (0:05-0:07):</p><p>Here is how our 30 minutes break down:</p><ul><li><strong>Learn (12 min):</strong> Research problem, Gemini capabilities, demonstration</li><li><strong>Consolidate (18 min):</strong> Hands-on research synthesis with 3 tasks</li><li><strong>Compress (2 min):</strong> Pattern recap, workflow summary, bridge to next module</li></ul><p>This module has the most hands-on time - bring your articles.</p></div></div>' },
            { title: "Slide 4: The Research Problem", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">The Traditional Research Problem</h2><p class="text-xl text-slate-400 mb-8">Traditional research is time-consuming</p><div class="w-full max-w-5xl"><div class="bg-slate-800/50 p-6 rounded-xl border border-slate-700 mb-6"><div class="flex items-center justify-center gap-4 flex-wrap text-sm"><div class="flex items-center gap-2 px-4 py-2 bg-red-500/20 rounded-lg"><span class="text-red-400 font-semibold">Find sources</span><span class="text-slate-500">30 min</span></div><i class="fa-solid fa-arrow-right text-slate-600"></i><div class="flex items-center gap-2 px-4 py-2 bg-red-500/20 rounded-lg"><span class="text-red-400 font-semibold">Read and take notes</span><span class="text-slate-500">60 min</span></div><i class="fa-solid fa-arrow-right text-slate-600"></i><div class="flex items-center gap-2 px-4 py-2 bg-red-500/20 rounded-lg"><span class="text-red-400 font-semibold">Compare and contrast</span><span class="text-slate-500">30 min</span></div><i class="fa-solid fa-arrow-right text-slate-600"></i><div class="flex items-center gap-2 px-4 py-2 bg-red-500/20 rounded-lg"><span class="text-red-400 font-semibold">Write summary</span><span class="text-slate-500">30 min</span></div></div><p class="text-center text-red-400 font-bold mt-4">= 2.5 hours minimum</p></div><div class="bg-emerald-900/20 p-6 rounded-xl border border-emerald-500/30"><h3 class="font-bold text-xl text-emerald-400 mb-4 text-center">AI-Accelerated Research</h3><div class="flex items-center justify-center gap-4 flex-wrap text-sm"><div class="flex items-center gap-2 px-4 py-2 bg-emerald-500/20 rounded-lg"><span class="text-emerald-400 font-semibold">Find sources</span><span class="text-slate-500">10 min</span></div><i class="fa-solid fa-arrow-right text-emerald-600"></i><div class="flex items-center gap-2 px-4 py-2 bg-emerald-500/20 rounded-lg"><span class="text-emerald-400 font-semibold">Paste to Gemini</span><span class="text-slate-500">2 min</span></div><i class="fa-solid fa-arrow-right text-emerald-600"></i><div class="flex items-center gap-2 px-4 py-2 bg-emerald-500/20 rounded-lg"><span class="text-emerald-400 font-semibold">Prompt synthesis</span><span class="text-slate-500">3 min</span></div><i class="fa-solid fa-arrow-right text-emerald-600"></i><div class="flex items-center gap-2 px-4 py-2 bg-emerald-500/20 rounded-lg"><span class="text-emerald-400 font-semibold">Review and refine</span><span class="text-slate-500">10 min</span></div></div><p class="text-center text-emerald-400 font-bold mt-4">= 25 minutes</p></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 4]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:07 - 0:10</span></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">The Research Problem (0:07-0:10):</p><p>Traditional research follows a linear process:</p><ul><li>Find sources - 30 minutes</li><li>Read and take notes - 60 minutes</li><li>Compare and contrast - 30 minutes</li><li>Write summary - 30 minutes</li></ul><p>That is 2.5 hours minimum for a basic research task.</p><p><strong>AI-Accelerated approach:</strong></p><ul><li>Find sources - 10 minutes</li><li>Paste to Gemini - 2 minutes</li><li>Prompt synthesis - 3 minutes</li><li>Review and refine - 10 minutes</li></ul><p>Total: 25 minutes. 6x faster.</p></div></div>' },
            { title: "Slide 5: What Gemini Does Well", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">What Gemini Does Well for Research</h2><div class="w-full max-w-5xl"><div class="overflow-hidden rounded-xl border border-slate-700 mb-6"><table class="w-full"><thead class="bg-slate-800"><tr><th class="text-left p-4 text-purple-400 font-semibold">Task</th><th class="text-left p-4 text-purple-400 font-semibold">Gemini Capability</th><th class="text-left p-4 text-purple-400 font-semibold">Time Saved</th></tr></thead><tbody class="divide-y divide-slate-700"><tr class="bg-slate-800/30"><td class="p-4 text-slate-300">Summarize long documents</td><td class="p-4 text-emerald-400">Fast extraction</td><td class="p-4 text-slate-400">70%</td></tr><tr><td class="p-4 text-slate-300">Compare multiple sources</td><td class="p-4 text-emerald-400">Side-by-side analysis</td><td class="p-4 text-slate-400">60%</td></tr><tr class="bg-slate-800/30"><td class="p-4 text-slate-300">Generate bullet summaries</td><td class="p-4 text-emerald-400">Condense to key points</td><td class="p-4 text-slate-400">50%</td></tr><tr><td class="p-4 text-slate-300">Identify gaps</td><td class="p-4 text-emerald-400">Cross-reference coverage</td><td class="p-4 text-slate-400">40%</td></tr></tbody></table></div><div class="bg-red-900/20 p-5 rounded-xl border border-red-500/30"><h3 class="font-bold text-lg text-red-400 mb-3"><i class="fa-solid fa-exclamation-triangle mr-2"></i>What Gemini Does NOT Replace:</h3><ul class="text-slate-300 space-y-2"><li><i class="fa-solid fa-xmark text-red-400 mr-2"></i>Critical evaluation of source credibility</li><li><i class="fa-solid fa-xmark text-red-400 mr-2"></i>Synthesis of novel insights (AI recombines, does not invent)</li><li><i class="fa-solid fa-xmark text-red-400 mr-2"></i>Decision-making based on synthesized information</li></ul></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 5]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:10 - 0:12</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-bullseye"></i>KEY MESSAGE</div><div class="key-message">Gemini accelerates research but cannot replace critical thinking about source quality.</div></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Gemini Capabilities (0:10-0:12):</p><p>Gemini excels at:</p><ul><li><strong>Summarization</strong> - 70% time savings on condensing long documents</li><li><strong>Comparison</strong> - 60% faster side-by-side analysis of sources</li><li><strong>Extraction</strong> - 50% quicker bullet point generation</li><li><strong>Gap identification</strong> - 40% faster cross-referencing</li></ul><p><strong>What Gemini cannot do:</strong></p><ul><li>Evaluate source credibility - that requires human judgment</li><li>Generate novel insights - AI recombines existing information</li><li>Make decisions - AI provides information, humans decide</li></ul></div></div>' },
            { title: "Slide 6: Core Research Functions", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Core Research Functions</h2><div class="w-full max-w-5xl"><div class="grid grid-cols-1 md:grid-cols-2 gap-6"><div class="bg-gradient-to-br from-blue-600/20 to-slate-800/50 p-6 rounded-xl border border-blue-500/30"><div class="w-12 h-12 rounded-full bg-blue-500/20 flex items-center justify-center mb-4"><i class="fa-solid fa-arrow-up-from-bracket text-blue-400 text-xl"></i></div><h3 class="font-bold text-xl text-blue-400 mb-2">1. EXTRACT</h3><p class="text-slate-300 mb-3">Pull specific data from documents</p><p class="text-sm text-slate-500 italic">"What are the key statistics in this report?"</p></div><div class="bg-gradient-to-br from-purple-600/20 to-slate-800/50 p-6 rounded-xl border border-purple-500/30"><div class="w-12 h-12 rounded-full bg-purple-500/20 flex items-center justify-center mb-4"><i class="fa-solid fa-compress text-purple-400 text-xl"></i></div><h3 class="font-bold text-xl text-purple-400 mb-2">2. SUMMARIZE</h3><p class="text-slate-300 mb-3">Condense longer content</p><p class="text-sm text-slate-500 italic">"Summarize this article in 3 bullet points"</p></div><div class="bg-gradient-to-br from-emerald-600/20 to-slate-800/50 p-6 rounded-xl border border-emerald-500/30"><div class="w-12 h-12 rounded-full bg-emerald-500/20 flex items-center justify-center mb-4"><i class="fa-solid fa-code-compare text-emerald-400 text-xl"></i></div><h3 class="font-bold text-xl text-emerald-400 mb-2">3. COMPARE</h3><p class="text-slate-300 mb-3">Analyze multiple sources</p><p class="text-sm text-slate-500 italic">"Compare these three articles. What do they agree on?"</p></div><div class="bg-gradient-to-br from-yellow-600/20 to-slate-800/50 p-6 rounded-xl border border-yellow-500/30"><div class="w-12 h-12 rounded-full bg-yellow-500/20 flex items-center justify-center mb-4"><i class="fa-solid fa-wand-magic-sparkles text-yellow-400 text-xl"></i></div><h3 class="font-bold text-xl text-yellow-400 mb-2">4. GENERATE</h3><p class="text-slate-300 mb-3">Create output from synthesis</p><p class="text-sm text-slate-500 italic">"Generate a one-page research brief"</p></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 6]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:12 - 0:16</span></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Core Functions (0:12-0:16):</p><p>The four core research functions in Gemini:</p><ol><li><strong>EXTRACT</strong> - Pull specific data from documents. Example: "What are the key statistics in this report?"</li><li><strong>SUMMARIZE</strong> - Condense longer content. Example: "Summarize this article in 3 bullet points"</li><li><strong>COMPARE</strong> - Analyze multiple sources. Example: "Compare these three articles. What do they agree on?"</li><li><strong>GENERATE</strong> - Create output from synthesis. Example: "Generate a one-page research brief"</li></ol><p>These four functions map directly to the research workflow.</p></div></div>' },
            { title: "Slide 7: Effective Research Prompts", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Effective Research Prompts</h2><div class="w-full max-w-4xl"><div class="space-y-4"><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="flex items-start gap-4"><div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center flex-shrink-0"><span class="text-blue-400 font-bold">EXTRACT</span></div><div><p class="text-slate-400 text-sm mb-2">Prompt:</p><p class="text-blue-400 font-mono">"From [source], extract [specific data type]"</p></div></div></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="flex items-start gap-4"><div class="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center flex-shrink-0"><span class="text-purple-400 font-bold">SUMMARIZE</span></div><div><p class="text-slate-400 text-sm mb-2">Prompt:</p><p class="text-purple-400 font-mono">"Summarize [source] in [number] bullets covering [topics]"</p></div></div></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="flex items-start gap-4"><div class="w-10 h-10 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold">COMPARE</span></div><div><p class="text-slate-400 text-sm mb-2">Prompt:</p><p class="text-emerald-400 font-mono">"Compare [A] and [B] on [topic]. Identify agreements and conflicts."</p></div></div></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="flex items-start gap-4"><div class="w-10 h-10 rounded-full bg-yellow-500/20 flex items-center justify-center flex-shrink-0"><span class="text-yellow-400 font-bold">SYNTHESIZE</span></div><div><p class="text-slate-400 text-sm mb-2">Prompt:</p><p class="text-yellow-400 font-mono">"Based on [sources], generate a [deliverable] about [topic]"</p></div></div></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 7]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:16 - 0:19</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-bullseye"></i>KEY MESSAGE</div><div class="key-message">Specific prompts yield specific results. Always include the source, the task, and the format.</div></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Effective Prompts (0:16-0:19):</p><p>Four effective prompt patterns for research:</p><ol><li><strong>EXTRACT:</strong> "From [source], extract [specific data type]"</li><li><strong>SUMMARIZE:</strong> "Summarize [source] in [number] bullets covering [topics]"</li><li><strong>COMPARE:</strong> "Compare [A] and [B] on [topic]. Identify agreements and conflicts."</li><li><strong>SYNTHESIZE:</strong> "Based on [sources], generate a [deliverable] about [topic]"</li></ol><p>Key principle: Always specify the source, the task type, and the desired output format.</p></div></div>' },
            { title: "Slide 8: Live Demonstration", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Live Demonstration</h2><p class="text-xl text-slate-400 mb-10">Watch the trainer perform these actions</p><div class="w-full max-w-5xl"><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="flex items-center gap-3 mb-3"><div class="w-8 h-8 rounded-lg bg-blue-500/20 flex items-center justify-center"><span class="text-blue-400 font-bold text-sm">1</span></div><h3 class="font-bold text-lg">Prepare Source Materials</h3></div><p class="text-sm text-slate-400">Open 3 articles - copy key paragraphs</p></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="flex items-center gap-3 mb-3"><div class="w-8 h-8 rounded-lg bg-purple-500/20 flex items-center justify-center"><span class="text-purple-400 font-bold text-sm">2</span></div><h3 class="font-bold text-lg">Extract Key Information</h3></div><p class="text-sm text-slate-400">Paste to Gemini - prompt for extraction</p></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="flex items-center gap-3 mb-3"><div class="w-8 h-8 rounded-lg bg-emerald-500/20 flex items-center justify-center"><span class="text-emerald-400 font-bold text-sm">3</span></div><h3 class="font-bold text-lg">Generate Comparison</h3></div><p class="text-sm text-slate-400">Compare sources - agreements and conflicts</p></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="flex items-center gap-3 mb-3"><div class="w-8 h-8 rounded-lg bg-yellow-500/20 flex items-center justify-center"><span class="text-yellow-400 font-bold text-sm">4</span></div><h3 class="font-bold text-lg">Create Research Brief</h3></div><p class="text-sm text-slate-400">Prompt for formatted brief with findings</p></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700 md:col-span-2"><div class="flex items-center gap-3 mb-3"><div class="w-8 h-8 rounded-lg bg-red-500/20 flex items-center justify-center"><span class="text-red-400 font-bold text-sm">5</span></div><h3 class="font-bold text-lg">Add Proper Attribution</h3></div><p class="text-sm text-slate-400">Reference sources - emphasize human verification of AI output</p></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 8]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:19 - 0:23</span></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i>TRAINER GUIDANCE</div><ul><li>Demo all 5 steps LIVE if possible</li><li>If internet is slow, show screenshots or pre-recorded video</li><li>Emphasize step 5 - proper attribution is critical</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Live Demo (0:19-0:23):</p><p>Demonstrate the complete research workflow:</p><ol><li><strong>Prepare Sources</strong> - Open 3 articles, copy key paragraphs</li><li><strong>Extract</strong> - Paste to Gemini, prompt for key information extraction</li><li><strong>Compare</strong> - Use Compare function to analyze agreements and conflicts</li><li><strong>Generate Brief</strong> - Prompt for a formatted research brief</li><li><strong>Attribution</strong> - Add proper citations to all AI-synthesized content</li></ol><p>Emphasize: AI output must always be verified and attributed.</p></div></div>' },
            { title: "Slide 9: Workshop - Task 1", content: '<div class="w-full flex flex-col items-center justify-center"><div class="mb-4 px-4 py-1 rounded-full bg-emerald-500/20 text-emerald-400 text-sm font-semibold border border-emerald-500/30">WORKSHOP</div><h2 class="text-4xl font-bold mb-4">Task 1: Extract Key Data</h2><p class="text-xl text-slate-400 mb-6">Time: 3 minutes</p><div class="w-full max-w-3xl"><div class="bg-slate-800/50 p-6 rounded-xl border border-emerald-500/30"><ol class="space-y-4"><li class="flex items-start gap-4"><div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold">1</span></div><p class="text-lg text-slate-200">Select key data section from each of the 3 articles</p></li><li class="flex items-start gap-4"><div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold">2</span></div><p class="text-lg text-slate-200">Copy to a new Google Doc</p></li><li class="flex items-start gap-4"><div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold">3</span></div><p class="text-lg text-slate-200">Use Gemini: <span class="text-purple-400">"List all statistics mentioned with their source"</span></p></li></ol></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 9]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:23 - 0:26</span></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i>TRAINER GUIDANCE</div><ul><li>3 minutes for this task</li><li>Circulate to help participants who are stuck</li><li>Ensure everyone has pasted content to Gemini</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Workshop Task 1 (0:23-0:26):</p><p><strong>Extract Key Data</strong></p><ol><li>Select key data section from each of the 3 articles</li><li>Copy to a new Google Doc</li><li>Use Gemini: "List all statistics mentioned with their source"</li></ol><p>This teaches the Extract function - pulling specific data types from source materials.</p></div></div>' },
            { title: "Slide 10: Workshop - Task 2", content: '<div class="w-full flex flex-col items-center justify-center"><div class="mb-4 px-4 py-1 rounded-full bg-emerald-500/20 text-emerald-400 text-sm font-semibold border border-emerald-500/30">WORKSHOP</div><h2 class="text-4xl font-bold mb-4">Task 2: Synthesize Sources</h2><p class="text-xl text-slate-400 mb-6">Time: 4 minutes</p><div class="w-full max-w-4xl"><div class="bg-slate-800/50 p-5 rounded-xl border border-emerald-500/30 mb-4"><p class="text-slate-300 mb-3">Use this prompt in Gemini:</p><div class="bg-slate-900 p-4 rounded-lg text-sm"><p class="text-purple-400 font-semibold mb-2">Based on these three articles about remote work productivity, generate:</p><p class="text-slate-300 mb-1">1. Executive Summary (3 sentences)</p><p class="text-slate-300 mb-1">2. Key Finding 1: [Title] with supporting evidence</p><p class="text-slate-300 mb-1">3. Key Finding 2: [Title] with supporting evidence</p><p class="text-slate-300 mb-1">4. Key Finding 3: [Title] with supporting evidence</p><p class="text-slate-300 mb-1">5. Conclusion (2 sentences)</p><p class="text-slate-300">6. Areas of Conflict (where sources disagree)</p></div></div><p class="text-center text-slate-500 text-sm">Review the output - does it make sense?</p></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 10]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:26 - 0:30</span></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i>TRAINER GUIDANCE</div><ul><li>4 minutes for synthesis task</li><li>This is the core research task</li><li>Walk around to help those with formatting issues</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Workshop Task 2 (0:26-0:30):</p><p><strong>Synthesize Sources</strong></p><p>Use the provided prompt to generate a structured research brief:</p><ul><li>Executive Summary</li><li>3 Key Findings with evidence</li><li>Conclusion</li><li>Areas of Conflict</li></ul><p>The key learning: Gemini can synthesize across multiple sources and format the output structuredly.</p></div></div>' },
            { title: "Slide 11: Workshop - Task 3", content: '<div class="w-full flex flex-col items-center justify-center"><div class="mb-4 px-4 py-1 rounded-full bg-emerald-500/20 text-emerald-400 text-sm font-semibold border border-emerald-500/30">WORKSHOP</div><h2 class="text-4xl font-bold mb-4">Task 3: Evaluate and Refine</h2><p class="text-xl text-slate-400 mb-6">Time: 3 minutes</p><div class="w-full max-w-3xl"><div class="bg-slate-800/50 p-6 rounded-xl border border-emerald-500/30"><ol class="space-y-4"><li class="flex items-start gap-4"><div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold">1</span></div><p class="text-lg text-slate-200">Read the AI-generated brief carefully</p></li><li class="flex items-start gap-4"><div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold">2</span></div><p class="text-lg text-slate-200">Identify one area where AI made an error or oversimplified</p></li><li class="flex items-start gap-4"><div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold">3</span></div><p class="text-lg text-slate-200">Refine: <span class="text-purple-400">"Revise the section about [topic] to address [concern]"</span></p></li></ol></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 11]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:30 - 0:33</span></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i>TRAINER GUIDANCE</div><ul><li>3 minutes for evaluation</li><li>This is the critical verification step</li><li>Encourage participants to find real errors</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Workshop Task 3 (0:30-0:33):</p><p><strong>Evaluate and Refine</strong></p><ol><li>Read the AI-generated brief carefully</li><li>Identify one area where AI made an error or oversimplified</li><li>Refine using: "Revise the section about [topic] to address [concern]"</li></ol><p>The key learning: AI output requires human verification. Always check for errors and refine.</p></div></div>' },
            { title: "Slide 12: Peer Exercise", content: '<div class="w-full flex flex-col items-center justify-center"><div class="mb-4 px-4 py-1 rounded-full bg-purple-500/20 text-purple-400 text-sm font-semibold border border-purple-500/30">PEER EXERCISE</div><h2 class="text-4xl font-bold mb-8">Share and Review</h2><div class="w-full max-w-3xl"><div class="space-y-4 mb-8"><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700 flex items-start gap-4"><div class="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center flex-shrink-0"><span class="text-purple-400 font-bold">1</span></div><p class="text-lg text-slate-200">Share your research brief with a partner</p></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700 flex items-start gap-4"><div class="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center flex-shrink-0"><span class="text-purple-400 font-bold">2</span></div><p class="text-lg text-slate-200">Partner reviews for: clarity, accuracy, missing perspectives</p></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700 flex items-start gap-4"><div class="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center flex-shrink-0"><span class="text-purple-400 font-bold">3</span></div><p class="text-lg text-slate-200">Discuss: Did AI help synthesize faster? What did it miss?</p></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 12]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:33 - 0:36</span></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i>TRAINER GUIDANCE</div><ul><li>3 minutes for peer review</li><li>Have pairs share key insights with the group</li><li>Discuss what AI did well and what it missed</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Peer Exercise (0:33-0:36):</p><ol><li>Share your research brief with a partner</li><li>Partner reviews for: clarity, clarity, accuracy, missing perspectives</li><li>Discuss: Did AI help synthesize faster? What did it miss?</li></ol><p>This peer review step reinforces that AI assistance does not replace human critical thinking and collaboration.</p></div></div>' },
            { title: "Slide 13: Pattern Recap", content: '<div class="w-full flex flex-col items-center justify-center text-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Pattern Recap</h2><div class="max-w-3xl"><div class="bg-gradient-to-br from-purple-900/30 to-slate-900/50 p-8 rounded-2xl border border-purple-500/30 mb-8"><p class="text-2xl md:text-3xl font-medium text-white leading-relaxed">"AI synthesizes at speed, but you <span class="text-red-400 font-bold">verify for accuracy</span>. Use Gemini to process sources fast, but <span class="text-yellow-400 font-bold">apply critical thinking</span> to the output."</p></div><div class="bg-slate-800/50 p-6 rounded-xl border border-slate-700"><h3 class="font-bold text-lg mb-4 text-purple-400">Research Quality Checklist:</h3><div class="text-left space-y-2 text-slate-300"><p><i class="fa-regular fa-square text-slate-500 mr-2"></i>AI summary matches your understanding of source</p><p><i class="fa-regular fa-square text-slate-500 mr-2"></i>Statistics are attributed to sources</p><p><i class="fa-regular fa-square text-slate-500 mr-2"></i>Conflicts between sources are acknowledged</p><p><i class="fa-regular fa-square text-slate-500 mr-2"></i>Conclusions follow logically from evidence</p></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 13]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:36 - 0:38</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-bullseye"></i>KEY MESSAGE</div><div class="key-message">AI synthesizes at speed, but you verify for accuracy.</div></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Pattern Recap (0:36-0:38):</p><p><strong>The Research Quality Checklist:</strong></p><ul><li>AI summary matches your understanding of source</li><li>Statistics are attributed to sources</li><li>Conflicts between sources are acknowledged</li><li>Conclusions follow logically from evidence</li></ul><p>Run through this checklist before finalizing any AI-assisted research.</p></div></div>' },
            { title: "Slide 14: Take-Away - Research Workflow", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-6 gradient-text">Take-Away: Research Workflow</h2><div class="w-full max-w-3xl"><div class="bg-slate-800 border border-slate-700 rounded-2xl overflow-hidden"><div class="bg-gradient-to-r from-purple-600 to-blue-600 p-4 text-center"><h3 class="text-xl font-bold">RESEARCH WORKFLOW AUTOMATION</h3></div><div class="p-6 space-y-4"><div class="border-b border-slate-700 pb-3"><p class="text-blue-400 font-semibold mb-2">STEP 1: COLLECT</p><ul class="text-slate-300 text-sm space-y-1"><li>Gather 3-5 relevant sources</li><li>Copy key sections (not entire documents)</li></ul></div><div class="border-b border-slate-700 pb-3"><p class="text-purple-400 font-semibold mb-2">STEP 2: EXTRACT</p><ul class="text-slate-300 text-sm space-y-1"><li>Prompt: "Extract all statistics, claims, and dates"</li><li>Create comparison table</li></ul></div><div class="border-b border-slate-700 pb-3"><p class="text-emerald-400 font-semibold mb-2">STEP 3: SYNTHESIZE</p><ul class="text-slate-300 text-sm space-y-1"><li>Prompt: "Generate [deliverable] comparing sources"</li><li>Specify format (brief, bullets, narrative)</li></ul></div><div class="border-b border-slate-700 pb-3"><p class="text-yellow-400 font-semibold mb-2">STEP 4: VERIFY</p><ul class="text-slate-300 text-sm space-y-1"><li>Read AI output against original sources</li><li>Flag errors or misrepresented claims</li></ul></div><div><p class="text-red-400 font-semibold mb-2">STEP 5: FINALIZE</p><ul class="text-slate-300 text-sm space-y-1"><li>Add citations and references</li><li>Note limitations and gaps</li></ul></div></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 14]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:38 - 0:40</span></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Research Workflow (0:38-0:40):</p><p><strong>5-Step Research Workflow:</strong></p><ol><li><strong>COLLECT</strong> - Gather 3-5 relevant sources, copy key sections</li><li><strong>EXTRACT</strong> - Use Gemini to extract statistics, claims, dates</li><li><strong>SYNTHESIZE</strong> - Generate structured output comparing sources</li><li><strong>VERIFY</strong> - Read AI output against originals, flag errors</li><li><strong>FINALIZE</strong> - Add citations, note limitations</li></ol><p>This becomes your repeatable research workflow.</p></div></div>' },
            { title: "Slide 15: Bridge to Module 5", content: '<div class="w-full flex flex-col items-center justify-center text-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Coming Up Next</h2><div class="max-w-3xl mb-8"><div class="bg-gradient-to-br from-blue-900/30 to-purple-900/30 p-8 rounded-2xl border border-purple-500/30"><p class="text-sm text-purple-400 uppercase tracking-wider mb-4">Module 5 Preview</p><h3 class="text-3xl font-bold mb-4">Meetings and Calendaring</h3><p class="text-xl text-slate-300 mb-6">Scheduling, agenda generation, and AI-powered note-taking that saves hours of administrative work.</p><div class="flex items-center justify-center gap-4 text-slate-400"><span><i class="fa-regular fa-clock mr-2"></i>30 minutes</span><span class="text-purple-400">|</span><span><i class="fa-solid fa-graduation-cap mr-2"></i>Module 5 of 8</span></div></div></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700 max-w-2xl"><p class="text-lg text-slate-300 mb-3">Before next session, try this:</p><p class="text-slate-400">Schedule a meeting using AI assistance - try Gemini or Calendar scheduling feature.</p></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 15]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:40 - 0:41</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-bullseye"></i>KEY MESSAGE</div><div class="key-message">End strong - preview what is next and give actionable homework.</div></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Wrap-Up (0:40-0:41):</p><p>Module 4 complete! Great work on the research workflow.</p><p><strong>Next module preview:</strong> Module 5 is about Meetings and Calendaring - using AI to automate scheduling and generate agendas.</p><p><strong>Homework:</strong> Schedule a meeting using AI assistance before next session.</p></div></div>' }
        ];
        let currentSlide = 0;
        const totalSlides = courseData.length;
        function updateSlide() {
            const slide = courseData[currentSlide];
            document.getElementById('slide-info').innerHTML = '<h3 class="text-purple-300 font-bold text-lg mb-4">' + slide.title + '</h3>';
            document.getElementById('notes-content').innerHTML = slide.notes;
            document.getElementById('slideCounter').textContent = 'Slide ' + (currentSlide + 1) + ' / ' + totalSlides;
            document.getElementById('bannerSlide').textContent = currentSlide + 1;
            document.getElementById('bannerTotal').textContent = totalSlides;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
            const previewContent = document.getElementById('preview-content');
            previewContent.innerHTML = slide.content;
            previewContent.style.fontSize = '12px';
            previewContent.style.lineHeight = '1.4';
            const aspectRatio = 16 / 9;
            const containerWidth = previewContent.parentElement.clientWidth;
            const containerHeight = previewContent.parentElement.clientHeight;
            let scale = 1;
            if (containerWidth && containerHeight) {
                const scaleX = containerWidth / 1600;
                const scaleY = containerHeight / (1600 / aspectRatio);
                scale = Math.min(scaleX, scaleY, 1);
            }
            previewContent.style.transform = 'scale(' + scale + ')';
            previewContent.style.width = '1600px';
            previewContent.style.height = (1600 / aspectRatio) + 'px';
            previewContent.style.maxWidth = 'none';
            channel.postMessage({ type: 'sync', index: currentSlide });
        }
        function nextSlide() { if (currentSlide < totalSlides - 1) { currentSlide++; updateSlide(); } }
        function prevSlide() { if (currentSlide > 0) { currentSlide--; updateSlide(); } }
        document.getElementById('nextBtn').addEventListener('click', nextSlide);
        document.getElementById('prevBtn').addEventListener('click', prevSlide);
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
        });
        var splitSlider = document.getElementById('splitSlider');
        var splitValue = document.getElementById('splitValue');
        splitSlider.addEventListener('input', function() {
            var val = splitSlider.value;
            splitValue.textContent = val + '%';
            document.getElementById('previewPane').style.height = val + '%';
            document.getElementById('notesPane').style.flex = '1';
        });
        window.addEventListener('resize', updateSlide);
        updateSlide();
    </script>
