    <script>
        const channel = new BroadcastChannel('sync_module_5_ai-productivity');
        function openReferenceInAudience(url) { channel.postMessage({ type: 'open-tab-url', url: url }); }
        function toggleReferenceDesk() { document.getElementById('referenceContent').classList.toggle('open'); document.getElementById('referenceToggle').classList.toggle('open'); }

        const courseData = [
            { title: "Slide 1: Title - Module 5: Meetings & Calendaring", content: '<div class="w-full flex flex-col items-center justify-center text-center"><div class="mb-6 px-4 py-1 rounded-full bg-blue-500/20 text-blue-400 text-sm font-semibold border border-blue-500/30">MODULE 5</div><h1 class="text-5xl md:text-7xl font-extrabold mb-6">Meetings & Calendaring</h1><p class="text-2xl md:text-3xl text-slate-400 mb-8">Schedule, Generate, and Capture with AI</p><div class="flex items-center gap-4 text-slate-500 text-lg"><span><i class="fa-regular fa-clock mr-2"></i>30 min</span><span class="text-purple-400">|</span><span><i class="fa-solid fa-graduation-cap mr-2"></i>Module 5 of 8</span></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 1]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:00 - 0:03</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-bullseye"></i>KEY MESSAGE</div><div class="key-message">This module is about reclaiming time from meeting admin work - scheduling, agendas, notes, follow-ups.</div></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Opening (0:00-0:03):</p><p>Welcome to Module 5: Meetings and Calendaring.</p><p>Today we tackle the meeting overhead problem - all the administrative time that goes into scheduling, preparing, and following up on meetings.</p><p>We will learn how AI can handle 65-80% of meeting admin tasks, freeing you for actual productive meeting time.</p><p>By the end, you will have a complete meeting automation workflow.</p></div></div>' },
            { title: "Slide 2: Learning Objectives", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Learning Objectives</h2><div class="space-y-5 w-full max-w-4xl"><div class="flex items-start gap-4 bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center flex-shrink-0"><span class="text-blue-400 font-bold">1</span></div><p class="text-xl font-semibold text-white">Schedule meetings using AI-assisted calendar commands</p></div><div class="flex items-start gap-4 bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center flex-shrink-0"><span class="text-blue-400 font-bold">2</span></div><p class="text-xl font-semibold text-white">Generate structured meeting agendas using Gemini</p></div><div class="flex items-start gap-4 bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center flex-shrink-0"><span class="text-blue-400 font-bold">3</span></div><p class="text-xl font-semibold text-white">Draft meeting notes and follow-up communications with AI</p></div><div class="flex items-start gap-4 bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center flex-shrink-0"><span class="text-blue-400 font-bold">4</span></div><p class="text-xl font-semibold text-white">Automate recurring meeting preparation workflows</p></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 2]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:03 - 0:05</span></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Learning Objectives (0:03-0:05):</p><p>By the end of this session, you will be able to:</p><ol><li><strong>Schedule</strong> - Use AI-assisted commands to find meeting times instantly</li><li><strong>Generate</strong> - Create professional meeting agendas with Gemini</li><li><strong>Draft</strong> - Use AI to write meeting notes and follow-up emails</li><li><strong>Automate</strong> - Build a reusable meeting preparation workflow</li></ol><p>These four skills eliminate meeting overhead.</p></div></div>' },
            { title: "Slide 3: Session Overview", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Session Overview</h2><div class="w-full max-w-4xl"><div class="grid grid-cols-3 gap-4 mb-6"><div class="bg-blue-600/20 p-4 rounded-xl border-l-4 border-blue-400 text-center"><div class="text-3xl font-bold text-blue-400 mb-2">12</div><div class="text-sm text-slate-400 uppercase tracking-wide">Minutes</div><div class="text-lg font-semibold mt-2 text-blue-300">LEARN</div></div><div class="bg-emerald-600/20 p-4 rounded-xl border-l-4 border-emerald-400 text-center"><div class="text-3xl font-bold text-emerald-400 mb-2">18</div><div class="text-sm text-slate-400 uppercase tracking-wide">Minutes</div><div class="text-lg font-semibold mt-2 text-emerald-300">CONSOLIDATE</div></div><div class="bg-purple-600/20 p-4 rounded-xl border-l-4 border-purple-400 text-center"><div class="text-3xl font-bold text-purple-400 mb-2">2</div><div class="text-sm text-slate-400 uppercase tracking-wide">Minutes</div><div class="text-lg font-semibold mt-2 text-purple-300">COMPRESS</div></div></div><div class="bg-slate-800/50 p-6 rounded-xl border border-slate-700"><div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm"><div><p class="text-blue-400 font-semibold mb-2">LEARN Phase</p><ul class="text-slate-400 space-y-1"><li>Meeting inefficiency costs</li><li>AI meeting workflow</li><li>Live demonstration</li></ul></div><div><p class="text-emerald-400 font-semibold mb-2">CONSOLIDATE Phase</p><ul class="text-slate-400 space-y-1"><li>AI scheduling exercise</li><li>Agenda generation task</li><li>AI notetaking practice</li></ul></div><div><p class="text-purple-400 font-semibold mb-2">COMPRESS Phase</p><ul class="text-slate-400 space-y-1"><li>Pattern recap</li><li>Meeting automation script</li><li>Bridge to Module 6</li></ul></div></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 3]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:05 - 0:07</span></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i>TRAINER GUIDANCE</div><ul><li>Quick overview - they will do hands-on scheduling during workshop</li><li>Emphasize the consolidate phase is entirely hands-on</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Session Structure (0:05-0:07):</p><p>Here is how our 30 minutes break down:</p><ul><li><strong>Learn (12 min):</strong> Meeting problem, AI solutions, live demo</li><li><strong>Consolidate (18 min):</strong> Hands-on scheduling and agenda creation</li><li><strong>Compress (2 min):</strong> Pattern recap, automation script, bridge</li></ul><p>The workshop portion is where the real learning happens - bring your calendar.</p></div></div>' },
            { title: "Slide 4: The Meeting Problem", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">The Meeting Problem</h2><p class="text-xl text-slate-400 mb-8">Meetings consume significant professional time</p><div class="w-full max-w-5xl"><div class="overflow-hidden rounded-xl border border-slate-700 mb-6"><table class="w-full"><thead class="bg-slate-800"><tr><th class="text-left p-4 text-blue-400 font-semibold">Metric</th><th class="text-left p-4 text-blue-400 font-semibold">Data</th></tr></thead><tbody class="divide-y divide-slate-700"><tr class="bg-slate-800/30"><td class="p-4 text-slate-300">Average meetings per week</td><td class="p-4 text-emerald-400">8-12 for knowledge workers</td></tr><tr><td class="p-4 text-slate-300">Meeting time as % of workday</td><td class="p-4 text-emerald-400">35-40%</td></tr><tr class="bg-slate-800/30"><td class="p-4 text-slate-300">Employees feeling over-meeted</td><td class="p-4 text-red-400">71%</td></tr><tr><td class="p-4 text-slate-300">Time in productive meetings</td><td class="p-4 text-red-400"><50% of meeting time</td></tr></tbody></table></div><div class="bg-red-900/20 p-5 rounded-xl border border-red-500/30 text-center"><p class="text-2xl font-bold text-red-400 mb-2">Most meeting time is wasted on admin</p><p class="text-slate-400">Scheduling, agenda creation, note-taking = 60% of meeting prep</p></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 4]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:07 - 0:10</span></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">The Meeting Problem (0:07-0:10):</p><p>The data is compelling:</p><ul><li>8-12 meetings per week for typical knowledge worker</li><li>35-40% of workday consumed by meetings</li><li>71% of employees feel over-meeted</li><li>Less than 50% of meeting time is actually productive</li></ul><p><strong>The real problem:</strong> 60% of meeting prep time goes to administrative tasks - scheduling, creating agendas, taking notes, sending follow-ups.</p><p>AI can eliminate most of this overhead.</p></div></div>' },
            { title: "Slide 5: Where AI Can Help", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Where AI Can Help</h2><div class="w-full max-w-5xl"><div class="grid grid-cols-3 gap-4 mb-6"><div class="bg-blue-600/20 p-5 rounded-xl border border-blue-500/30"><h3 class="font-bold text-lg text-blue-400 mb-4 text-center">BEFORE</h3><ul class="text-slate-300 space-y-2 text-sm"><li><i class="fa-solid fa-robot text-blue-400 mr-2"></i>Find time slots</li><li><i class="fa-solid fa-robot text-blue-400 mr-2"></i>Generate agenda</li><li><i class="fa-solid fa-robot text-blue-400 mr-2"></i>Send invites</li><li><i class="fa-solid fa-robot text-blue-400 mr-2"></i>Prep materials</li></ul></div><div class="bg-purple-600/20 p-5 rounded-xl border border-purple-500/30"><h3 class="font-bold text-lg text-purple-400 mb-4 text-center">DURING</h3><ul class="text-slate-300 space-y-2 text-sm"><li><i class="fa-solid fa-microphone text-purple-400 mr-2"></i>AI notetaking</li><li><i class="fa-solid fa-clipboard text-purple-400 mr-2"></i>Transcription</li><li><i class="fa-solid fa-check text-purple-400 mr-2"></i>Action capture</li><li><i class="fa-solid fa-language text-purple-400 mr-2"></i>Translation</li></ul></div><div class="bg-emerald-600/20 p-5 rounded-xl border border-emerald-500/30"><h3 class="font-bold text-lg text-emerald-400 mb-4 text-center">AFTER</h3><ul class="text-slate-300 space-y-2 text-sm"><li><i class="fa-solid fa-file text-emerald-400 mr-2"></i>Auto-generate notes</li><li><i class="fa-solid fa-envelope text-emerald-400 mr-2"></i>Distribute summary</li><li><i class="fa-solid fa-list-check text-emerald-400 mr-2"></i>Create follow-up tasks</li><li><i class="fa-solid fa-gavel text-emerald-400 mr-2"></i>Track decisions</li></ul></div></div><div class="bg-emerald-900/20 p-4 rounded-xl border border-emerald-500/30 text-center"><p class="text-emerald-400 font-semibold">Time savings potential: 65-80% on meeting admin tasks</p></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 5]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:10 - 0:12</span></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Where AI Can Help (0:10-0:12):</p><p>AI assists across the entire meeting lifecycle:</p><p><strong>BEFORE (Pre-meeting):</strong></p><ul><li>Find time slots - AI searches calendars automatically</li><li>Generate agenda - Gemini creates structured agendas</li><li>Send invites - Automated with AI-crafted messages</li><li>Prep materials - AI summarizes relevant documents</li></ul><p><strong>DURING (Meeting):</strong></p><ul><li>AI notetaking - Automatic capture and labeling</li><li>Transcription - Full searchable text</li><li>Action capture -识别 and track action items</li></ul><p><strong>AFTER (Post-meeting):</strong></p><ul><li>Auto-generate notes - AI creates structured summaries</li><li>Distribute summary - Automatic to attendees</li><li>Create tasks - Extract and create calendar tasks</li></ul><p>65-80% time savings on admin tasks.</p></div></div>' },
            { title: "Slide 6: Time Savings", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Time Savings Potential</h2><div class="w-full max-w-5xl"><div class="overflow-hidden rounded-xl border border-slate-700 mb-6"><table class="w-full"><thead class="bg-slate-800"><tr><th class="text-left p-4 text-blue-400 font-semibold">Task</th><th class="text-left p-4 text-blue-400 font-semibold">Manual Time</th><th class="text-left p-4 text-blue-400 font-semibold">AI-Assisted</th><th class="text-left p-4 text-blue-400 font-semibold">Savings</th></tr></thead><tbody class="divide-y divide-slate-700"><tr class="bg-slate-800/30"><td class="p-4 text-slate-300">Scheduling (finding time)</td><td class="p-4 text-red-400">10-15 min</td><td class="p-4 text-emerald-400">2-3 min</td><td class="p-4 text-emerald-400 font-bold">80%</td></tr><tr><td class="p-4 text-slate-300">Agenda creation</td><td class="p-4 text-red-400">10 min</td><td class="p-4 text-emerald-400">2 min</td><td class="p-4 text-emerald-400 font-bold">80%</td></tr><tr class="bg-slate-800/30"><td class="p-4 text-slate-300">Note-taking</td><td class="p-4 text-red-400">20-30 min</td><td class="p-4 text-emerald-400">5 min (review)</td><td class="p-4 text-emerald-400 font-bold">75%</td></tr><tr><td class="p-4 text-slate-300">Follow-up communications</td><td class="p-4 text-red-400">15 min</td><td class="p-4 text-emerald-400">5 min</td><td class="p-4 text-emerald-400 font-bold">65%</td></tr></tbody></table></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 6]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:12 - 0:16</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-bullseye"></i>KEY MESSAGE</div><div class="key-message">AI reduces meeting admin by 65-80%. That is hours per week reclaimed.</div></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Time Savings (0:12-0:16):</p><p>Specific time savings with AI:</p><ul><li><strong>Scheduling:</strong> 10-15 min → 2-3 min (80% savings)</li><li><strong>Agenda creation:</strong> 10 min → 2 min (80% savings)</li><li><strong>Note-taking:</strong> 20-30 min → 5 min review (75% savings)</li><li><strong>Follow-up:</strong> 15 min → 5 min (65% savings)</li></ul><p>If you have 5 meetings per week, that is 60-90 minutes saved weekly. Over a month, that is 4-6 hours of productive time.</p></div></div>' },
            { title: "Slide 7: AI Meeting Workflow", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">AI Meeting Workflow</h2><div class="w-full max-w-5xl"><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><div class="bg-gradient-to-br from-blue-600/20 to-slate-800/50 p-6 rounded-xl border border-blue-500/30"><div class="w-12 h-12 rounded-full bg-blue-500/20 flex items-center justify-center mb-4"><i class="fa-solid fa-calendar text-blue-400 text-xl"></i></div><h3 class="font-bold text-xl text-blue-400 mb-2">PHASE 1: PRE</h3><ul class="text-slate-300 space-y-2 text-sm"><li>Find time: Calendar Gemini</li><li>Generate agenda: Gemini Docs</li><li>Prep materials: Gemini + Drive</li></ul></div><div class="bg-gradient-to-br from-purple-600/20 to-slate-800/50 p-6 rounded-xl border border-purple-500/30"><div class="w-12 h-12 rounded-full bg-purple-500/20 flex items-center justify-center mb-4"><i class="fa-solid fa-video text-purple-400 text-xl"></i></div><h3 class="font-bold text-xl text-purple-400 mb-2">PHASE 2: DURING</h3><ul class="text-slate-300 space-y-2 text-sm"><li>AI notetaking: Meet notes</li><li>Transcription: Meet transcripts</li><li>Action capture: Manual + AI</li></ul></div><div class="bg-gradient-to-br from-emerald-600/20 to-slate-800/50 p-6 rounded-xl border border-emerald-500/30"><div class="w-12 h-12 rounded-full bg-emerald-500/20 flex items-center justify-center mb-4"><i class="fa-solid fa-clipboard-check text-emerald-400 text-xl"></i></div><h3 class="font-bold text-xl text-emerald-400 mb-2">PHASE 3: POST</h3><ul class="text-slate-300 space-y-2 text-sm"><li>Generate summary: Gemini</li><li>Draft follow-up: Gemini Gmail</li><li>Create tasks: Gemini + Tasks</li></ul></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 7]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:16 - 0:19</span></div><div c             { title: "Slide 9: Workshop - Task 1", content: '<div class="w-full flex flex-col items-center justify-center"><div class="mb-4 px-4 py-1 rounded-full bg-emerald-500/20 text-emerald-400 text-sm font-semibold border border-emerald-500/30">WORKSHOP</div><h2 class="text-4xl font-bold mb-4">Task 1: AI-Assisted Scheduling</h2><p class="text-xl text-slate-400 mb-6">Time: 3 minutes</p><div class="w-full max-w-3xl"><div class="bg-slate-800/50 p-6 rounded-xl border border-emerald-500/30"><ol class="space-y-4"><li class="flex items-start gap-4"><div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold">1</span></div><p class="text-lg text-slate-200">Open Google Calendar</p></li><li class="flex items-start gap-4"><div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold">2</span></div><p class="text-lg text-slate-200">Click "Create" or use Gemini panel</p></li><li class="flex items-start gap-4"><div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold">3</span></div><p class="text-lg text-slate-200">Try: "Find 30 min for a 1:1 with your manager next week"</p></li></ol></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 9]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:23 - 0:26</span></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i>TRAINER GUIDANCE</div><ul><li>3 minutes for scheduling task</li><li>Circulate to help participants</li><li>Everyone should create at least one AI-scheduled event</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Workshop Task 1             { title: "Slide 10: Workshop - Task 2", content: '<div class="w-full flex flex-col items-center justify-center"><div class="mb-4 px-4 py-1 rounded-full bg-emerald-500/20 text-emerald-400 text-sm font-semibold border border-emerald-500/30">WORKSHOP</div><h2 class="text-4xl font-bold mb-4">Task 2: Generate Meeting Agenda</h2><p class="text-xl text-slate-400 mb-6">Time: 4 minutes</p><div class="w-full max-w-4xl"><div class="bg-slate-800/50 p-5 rounded-xl border border-emerald-500/30 mb-4"><p class="text-slate-300 mb-3">Create new Google Doc and use Gemini with:</p><div class="bg-slate-900 p-4 rounded-lg text-sm"><p class="text-purple-400 font-semibold mb-2">Create a professional meeting agenda for a 30-minute meeting.</p><p class="text-slate-300 mb-1">Meeting Type: Weekly Team Sync</p><p class="text-slate-300 mb-1">Attendees: 6 team members</p><p class="text-slate-300 mb-1">Purpose: Share updates, identify blockers, coordinate on Q3 goals</p></div></div><p class="text-center text-slate-500 text-sm">Review and personalize the agenda, then save to Drive</p></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 10]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:26 - 0:30</span></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i>TRAINER GUIDANCE</div><ul><li>4 minutes for agenda generation</li><li>This is the core creative task</li><li>Have participants share their favorite agenda structure</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Workshop Task 2 (0:26-0:30):</p><p><strong>Generate Meeting Agenda</strong></p><ol><li>Create new Google Doc</li><li>Open Gemini with Ctrl+Shift+M</li><li>Use the provided prompt to generate agenda</li><li>Review and personalize</li><li>Save to Drive</li></ol><p>Key             { title: "Slide 11: Workshop - Task 3", content: '<div class="w-full flex flex-col items-center justify-center"><div class="mb-4 px-4 py-1 rounded-full bg-emerald-500/20 text-emerald-400 text-sm font-semibold border border-emerald-500/30">WORKSHOP</div><h2 class="text-4xl font-bold mb-4">Task 3: Schedule the Meeting</h2><p class="text-xl text-slate-400 mb-6">Time: 3 minutes</p><div class="w-full max-w-3xl"><div class="bg-slate-800/50 p-6 rounded-xl border border-emerald-500/30"><div class="space-y-4"><div class="flex items-start gap-4"><div class="w-10 h-10 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold">1</span></div><p class="text-lg text-slate-200">Create calendar event with AI-generated agenda</p></div><div class="flex items-start gap-4"><div class="w-10 h-10 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold">2</span></div><p class="text-lg text-slate-200">Copy agenda into event description</p></div><div class="flex items-start gap-4"><div class="w-10 h-10 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold">3</span></div><p class="text-lg text-slate-200">Set reminder, add location/video link, send invite</p></div></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 11]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:30 - 0:33</span></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i>TRAINER GUIDANCE</div><ul><li>3 minutes to complete scheduling</li><li>This brings together scheduling and agenda</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Workshop Task 3 (0:30-0:33):<             { title: "Slide 12: AI Notetaking Exercise", content: '<div class="w-full flex flex-col items-center justify-center"><div class="mb-4 px-4 py-1 rounded-full bg-purple-500/20 text-purple-400 text-sm font-semibold border border-purple-500/30">AI NOTETAKING EXERCISE</div><h2 class="text-4xl font-bold mb-8">Extract Meeting Information</h2><div class="w-full max-w-4xl"><div class="bg-slate-800/50 p-5 rounded-xl border border-purple-500/30 mb-4"><p class="text-slate-300 mb-3">Use this simulated meeting to practice AI extraction:</p><div class="bg-slate-900 p-4 rounded-lg text-sm max-h-48 overflow-y-auto"><p class="text-slate-400 mb-2">Project Status Update - May 27, 2026</p><p class="text-slate-400 mb-2">Attendees: Alex (PM), Jordan (Design), Taylor (Engineering)</p><p class="text-slate-400 mb-2">Q2 launch on track - 92% of sprint goals met.</p><p class="text-slate-400 mb-2">Design review for dashboard complete. Ready for dev handoff.</p><p class="text-slate-400 mb-2">Engineering can start Monday. Need final API specs.</p><p class="text-emerald-400 mb-2">DECISIONS: Launch date June 15. Dashboard in Phase 2 (July).</p><p class="text-yellow-400">ACTIONS: Jordan - send specs to Taylor by EOD Friday. Taylor - schedule backend sync. Alex - update stakeholder presentation.</p></div></div><div class="bg-purple-900/20 p-4 rounded-xl border border-purple-500/30"><p class="text-purple-400 font-semibold mb-2">Gemini Prompt:</p><p class="text-slate-300 text-sm">"Extract: decisions made, action items with owners, 3-bullet summary for those who missed"</p></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 12]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:33 - 0:36</span></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i>TRAINER GUIDANCE</div><ul><li>3 minutes for notetaking exercise</li><li>This is the post-meeting AI skill</li></ul></div>             { title: "Slide 13: Pattern Recap", content: '<div class="w-full flex flex-col items-center justify-center text-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Pattern Recap</h2><div class="max-w-3xl"><div class="bg-gradient-to-br from-blue-900/30 to-slate-900/50 p-8 rounded-2xl border border-blue-500/30 mb-8"><p class="text-2xl md:text-3xl font-medium text-white leading-relaxed">"AI does not replace meeting productivity — it removes the <span class="text-blue-400 font-bold">administrative overhead</span>. Use it to capture, not to think."</p></div><div class="bg-slate-800/50 p-6 rounded-xl border border-slate-700"><h3 class="font-bold text-lg mb-4 text-blue-400">Meeting AI Decision Guide:</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-left"><div><p class="text-emerald-400 font-semibold mb-2">USE AI FOR:</p><ul class="text-slate-300 space-y-1"><li><i class="fa-solid fa-check text-emerald-400 mr-2"></i>Scheduling coordination</li><li><i class="fa-solid fa-check text-emerald-400 mr-2"></i>Agenda templating</li><li><i class="fa-solid fa-check text-emerald-400 mr-2"></i>Note capture</li><li><i class="fa-solid fa-check text-emerald-400 mr-2"></i>Follow-up drafting</li></ul></div><div><p class="text-red-400 font-semibold mb-2">USE HUMAN FOR:</p><ul class="text-slate-300 space-y-1"><li><i class="fa-solid fa-xmark text-red-400 mr-2"></i>Meeting necessity</li><li><i class="fa-solid fa-xmark text-red-400 mr-2"></i>Discussion facilitation</li><li><i class="fa-solid fa-xmark text-red-400 mr-2"></i>Sensitive feedback</li><li><i class="fa-solid fa-xmark text-red-400 mr-2"></i>Strategic decisions</li></ul></div></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 13]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:36 - 0:38</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-bullseye"></i>KEY MESSAGE</div><div class="key-message">AI handles admin, humans handle meaning.</div></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Pattern Recap (0:36-0:38):</p><p><strong>Use AI for:</strong></p><ul><li>Scheduling coordination</li><li>Agenda templating</li><li>Note capture</li><li>Follow-up drafting</li></ul><p><strong>Use Human for:</strong></p><ul><li>Meeting necessity - should this meeting exist?</li><li>Discussion facilitation - leading conversation</li><li>Sensitive feedback - relationship-aware communication</li><li>Strategic decisions - AI informs, humans decide</li></ul><p>AI handles the administrative overhead so humans can focus on meaning.</p></div></div>' },
            { title: "Slide 14: Take-Away - Meeting Automation Script", content: '<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-6 gradient-text">Take-Away: Meeting Automation Script</h2><div class="w-full max-w-3xl"><div class="bg-slate-800 border border-slate-700 rounded-2xl overflow-hidden"><div class="bg-gradient-to-r from-blue-600 to-purple-600 p-4 text-center"><h3 class="text-xl font-bold">MEETING AUTOMATION SCRIPT</h3></div><div class="p-6 space-y-3 text-sm"><div class="flex items-start gap-3"><div class="w-6 h-6 rounded bg-blue-500/20 flex items-center justify-center flex-shrink-0"><span class="text-blue-400 font-bold">1</span></div><p class="text-slate-300"><span class="text-blue-400">SCHEDULE:</span> "Find 30 min for [meeting] with [attendees]"</p></div><div class="flex items-start gap-3"><div class="w-6 h-6 rounded bg-purple-500/20 flex items-center justify-center flex-shrink-0"><span class="text-purple-400 font-bold">2</span></div><p class="text-slate-300"><span class="text-purple-400">AGENDA:</span> Gemini → "Create agenda for [meeting type]" → Copy to calendar</p></div><div class="flex items-start gap-3"><div class="w-6 h-6 rounded bg-emerald-500/20 flex items-center justify-center flex-shrink-0"><span class="text-emerald-400 font-bold">3</span></div><p class="text-slate-300"><span class="text-emerald-400">PREP:</span> "Summarize relevant docs in Drive for [meeting]"</p></div><div class="flex items-start gap-3"><div class="w-6 h-6 rounded bg-yellow-500/20 flex items-center justify-center flex-shrink-0"><span class="text-yellow-400 font-bold">4</span></div><p class="text-slate-300"><span class="text-yellow-400">DURING:</span> Let Meet AI capture notes (if enabled)</p></div><div class="flex items-start gap-3"><div class="w-6 h-6 rounded bg-red-500/20 flex items-center justify-center flex-shrink-0"><span class="text-red-400 font-bold">5</span></div><p class="text-slate-300"><span class="text-red-400">POST:</span> Gemini extract → "Draft team update email"</p></div></div></div></div></div>', notes: '<div class="slide-cue-box">***[Advance to Slide 14]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:38 - 0:40</span></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Meeting Automation Script (0:38-0:40):</p><p><strong>7-Step Meeting Automation:</strong></p><ol><li><strong>SCHEDULE:</strong> "Find 30 min for [meeting] with [attendees]"</li><li><strong>AGENDA:</strong> Gemini → "Create agenda for [meeting type]" → Copy to calendar</li><li><strong>PREP:</strong> "Summarize relevant docs in Drive for [meeting]"</li><li><strong>DURING:</strong> Let Meet AI capture notes if enabled</li><li><strong>POST:</strong> Gemini extract decisions and actions → Draft team update</li><li><strong>TASKS:</strong> Create tasks from action items</li><li><strong>ARCHIVE:</strong> Save meeting Doc to project folder</li></ol><p>This becomes your reusable meeting workflow.</p></div></div>' },

tructures with AI.</p><p><strong>Homework:</strong> Schedule one meeting this week using AI assistance. Notice how much time you save.</p></div></div>' }
        ];

        let currentSlide = 0;
        const totalSlides = courseData.length;

        function updateSlide() {
            const slide = courseData[currentSlide];
            document.getElementById('slide-info').innerHTML = '<h3 class="text-purple-300 font-bold text-lg mb-4">' + slide.title + '</h3>';
            document.getElementById('notes-content').innerHTML = slide.notes;
            document.getElementById('slideCounter').textContent = 'Slide ' + (currentSlide + 1) + ' / ' + totalSlides;
            document.getElementById('bannerSlide').textContent = currentSlide + 1;
            document.getElementById('bannerTotal').textContent = totalSlides;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;

            const previewContent = document.getElementById('preview-content');
            previewContent.innerHTML = slide.content;
            previewContent.style.fontSize = '12px';
            previewContent.style.lineHeight = '1.4';

            const aspectRatio = 16 / 9;
            const containerWidth = previewContent.parentElement.clientWidth;
            const containerHeight = previewContent.parentElement.clientHeight;

            let scale = 1;
            if (containerWidth && containerHeight) {
                const scaleX = containerWidth / 1600;
                const scaleY = containerHeight / (1600 / aspectRatio);
                scale = Math.min(scaleX, scaleY, 1);
            }

            previewContent.style.transform = 'scale(' + scale + ')';
            previewContent.style.width = '1600px';
            previewContent.style.height = (1600 / aspectRatio) + 'px';
            previewContent.style.maxWidth = 'none';

            channel.postMessage({ type: 'sync', index: currentSlide });
        }

        function nextSlide() { if (currentSlide < totalSlides - 1) { currentSlide++; updateSlide(); } }
        function prevSlide() { if (currentSlide > 0) { currentSlide--; updateSlide(); } }

        document.getElementById('nextBtn').addEventListener('click', nextSlide);
        document.getElementById('prevBtn').addEventListener('click', prevSlide);

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
        });

        var splitSlider = document.getElementById('splitSlider');
        var splitValue = document.getElementById('splitValue');
        splitSlider.addEventListener('input', function() {
            var val = splitSlider.value;
            splitValue.textContent = val + '%';
            document.getElementById('previewPane').style.height = val + '%';
            document.getElementById('notesPane').style.flex = '1';
        });

        window.addEventListener('resize', updateSlide);
        updateSlide();
    </script>
