<!DOCTYPE html>
<html lang="en">
<head>

        .controls button:hover { background-color: #4f46e5; }
        .controls button:disabled { background-color: #334155; color: #64748b; cursor: not-allowed; }
        .status { font-family: monospace; font-size: 16px; background: #000; padding: 8px 16px; border-radius: 6px; border: 1px solid #334155; white-space: nowrap; }
        .main-container { display: flex; flex-direction: column; flex: 1; overflow-y: auto; }
        .preview-pane { flex: none; height: 45%; min-height: 35vh; padding: 15px; border-bottom: 1px solid #334155; display: flex; flex-direction: column; background-color: #0a0a0a; }

        .script-text { color: #e2e8f0; background: #0f172a; padding: 14px 16px; border-radius: 6px; line-height: 1.7; }
        .script-text ul { margin: 0; padding-left: 20px; }
        .script-text li { margin-bottom: 8px; }
        .guidance-box { background: linear-gradient(135deg, #1e1e3a, #1e293b); border-left: 4px solid #f59e0b; padding: 14px 18px; margin-bottom: 16px; border-radius: 4px; }
        .guidance-header { color: #f59e0b; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .guidance-box ul { margin: 0; padding-left: 20px; }
        .guidance-box li { color: #e2e8f0; margin-bottom: 4px; }
        .key-message-box { background: #1a1a2e; border-left: 4px solid #a78bfa; padding: 12px 16px; margin-bottom: 16px; border-radius: 4px; }
        .key-message-header { display: flex; align-items: center; margin-bottom: 8px; color: #a78bfa; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .key-message-header i { margin-right: 8px; }
        .key-message { color: #e2e8f0; font-weight: 500; }
        .trainer-notes-section { margin-top: 16px; }

        .notes-header i { margin-right: 8px; }
        .trainer-note { background: #2a1a00; border-left: 4px solid #f59e0b; padding: 12px 16px; margin-bottom: 6px; border-radius: 4px; color: #e2e8f0; font-size: 13px; line-height: 1.8; }
        .trainer-note .script-heading { color: #a78bfa; font-weight: 700; margin-top: 12px; margin-bottom: 6px; }
        .trainer-note .script-heading:first-child { margin-top: 0; }

        .trainer-note ol { margin: 8px 0; padding-left: 20px; list-style-type: decimal; }
        .trainer-note li { margin-bottom: 4px; }
        .trainer-note p { margin: 8px 0; }
        .gradient-text { background: linear-gradient(135deg, #a78bfa, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .reference-desk { background: linear-gradient(135deg, #1e1e3a, #0f172a); border: 1px solid #a78bfa; border-radius: 8px; margin-top: 20px; overflow: hidden; }
        .reference-desk-header { background: #0f172a; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
        .reference-desk-header:hover { background: #1e293b; }
        .reference-desk-title { display: flex; align-items: center; gap: 8px; color: #a78bfa; font-weight: 700; font-size: 14px; }
        .reference-desk-toggle { color: #94a3b8; transition: transform 0.3s ease; }
        .reference-desk-toggle.open { transform: rotate(180deg); }
        .reference-desk-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; background: #0f172a; }
        .reference-desk-content.open { max-height: 600px; overflow-y: auto; }
        .reference-list { padding: 16px; list-style: none; margin: 0; }
        .reference-list li { padding: 10px 0; border-bottom: 1px solid #334155; }
        .reference-item { font-size: 13px; line-height: 1.6; color: #e2e8f0; }
        .reference-item .ref-number { color: #a78bfa; font-weight: 700; margin-right: 8px; }
        .reference-link { color: #60a5fa; text-decoration: underline; cursor: pointer; transition: color 0.2s; }
        .reference-link:hover { color: #93c5fd; }
    </style>
</head>
<body>
    <div class="module-banner">
        <div class="flex items-center gap-4">
            <span class="text-2xl font-bold">Module 2</span>
            <span class="text-purple-200">Collaboration with AI</span>
        </div>
        <div class="text-xl font-mono bg-purple-800 px-4 py-1 rounded-lg">Slide <span id="bannerSlide">1</span> of <span id="bannerTotal">16</span></div>
    </div>
    <div class="top-bar">
        <div class="brand">
            <i class="fa-solid fa-robot" style="color: #a78bfa; font-size: 20px; margin-right: 10px;"></i>
            <span style="font-size: 18px; font-weight: bold;">Presenter View</span>
        </div>
        <div class="split-control" style="display: flex; align-items: center; gap: 10px; color: #94a3b8; font-size: 14px; background: #000; padding: 8px 16px; border-radius: 6px; border: 1px solid #334155;">
            <label for="splitSlider"><i class="fa-solid fa-left-right text-purple-400"></i> Audience:</label>

        <div class="controls">
            <button id="prevBtn"><i class="fa-solid fa-chevron-left"></i> Prev</button>

    <div class="main-container" id="mainContainer">
        <div class="preview-pane" id="previewPane">
            <h2><span>Audience Preview</span></h2>

                <div class="preview-content-wrapper text-slate-100" id="preview-content"></div>
            </div>
        </div>

        </div>
        <div class="reference-desk" id="referenceDesk">

                <div class="reference-desk-title">
                    <i class="fa-solid fa-book-open"></i>
                    <span>Reference Desk</span>
                </div>
                <div class="reference-desk-toggle" id="referenceToggle">
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
            </div>
            <div class="reference-desk-content open" id="referenceContent">
                <ul class="reference-list">
                    <li>
                        <div class="ref-item"><span class="ref-number">[1]</span>Google Docs Collaboration <a href="javascript:void(0)" onclick="openReferenceInAudience('https://support.google.com/docs/answer/9060449')" class="reference-link">Collaboration Features Guide</a></div>
                    </li>
                    <li>
                        <div class="ref-item"><span class="ref-number">[2]</span>Suggesting Mode <a href="javascript:void(0)" onclick="openReferenceInAudience('https://support.google.com/docs/answer/11155622')" class="reference-link">How to Use Suggesting</a></div>
                    </li>
                </ul>
            </div>
        </div>
    </div>
    <script>
        const channel = new BroadcastChannel('sync_module_2_ai-productivity');

        function openReferenceInAudience(url) {
            channel.postMessage({ type: 'open-tab-url', url: url });
        }

        function toggleReferenceDesk() {
            const content = document.getElementById('referenceContent');
            const toggle = document.getElementById('referenceToggle');
            content.classList.toggle('open');
            toggle.classList.toggle('open');
        }

        const courseData = [
            {
                title: "Slide 1: Title - Module 2: Collaboration with AI",
                content: `<div class="w-full flex flex-col items-center justify-center text-center"><div class="mb-6 px-4 py-1 rounded-full bg-purple-500/20 text-purple-400 text-sm font-semibold border border-purple-500/30">MODULE 2</div><h1 class="text-5xl md:text-7xl font-extrabold mb-6">Collaboration with AI</h1><p class="text-2xl md:text-3xl text-slate-400 mb-8">Real-Time Co-Authoring and Feedback</p><div class="flex items-center gap-4 text-slate-500 text-lg"><span><i class="fa-regular fa-clock mr-2"></i>30 min</span><span class="text-purple-400">|</span><span><i class="fa-solid fa-graduation-cap mr-2"></i>Module 2 of 8</span></div></div>`,
                notes: `<div class="slide-cue-box">***[Advance to Slide 1]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:00 - 0:03</span></div><div class="key-message-box"><div class="key-message-header"><i class="fa-solid fa-bullseye"></i>KEY MESSAGE</div><div class="key-message">Welcome back. Today we build on Module 1 by adding collaboration features with AI assistance.</div></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Opening (0:00-0:03):</p><p>Welcome to Module 2: Collaboration with AI.</p><p>Last module we learned to use Gemini individually. Today we learn how AI helps us work BETTER with colleagues - co-authoring documents, generating thoughtful feedback, and knowing when AI helps vs. when we need human judgment.</p><p>This is where Google Workspace really shines - real-time collaboration with AI assistance built in.</p></div></div>`
            },
            {
                title: "Slide 2: Learning Objectives",
                content: `<div class="w-full flex flex-col items-center justify-center max-w-4xl"><h2 class="text-4xl font-bold mb-8 gradient-text">Learning Objectives</h2><div class="space-y-5 w-full"><div class="flex items-start gap-4 bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center flex-shrink-0"><span class="text-purple-400 font-bold">1</span></div><p class="text-xl font-semibold text-white">Share a document with editing permissions and co-author in real-time</p></div><div class="flex items-start gap-4 bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center flex-shrink-0"><span class="text-purple-400 font-bold">2</span></div><p class="text-xl font-semibold text-white">Switch between Editing and Suggesting modes</p></div><div class="flex items-start gap-4 bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center flex-shrink-0"><span class="text-purple-400 font-bold">3</span></div><p class="text-xl font-semibold text-white">Use AI to generate, respond to, or resolve comments</p></div><div class="flex items-start gap-4 bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center flex-shrink-0"><span class="text-purple-400 font-bold">4</span></div><p class="text-xl font-semibold text-white">Identify when AI assistance enhances vs. replaces human judgment</p></div></div></div>`,
                notes: `<div class="slide-cue-box">***[Advance to Slide 2]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:03 - 0:05</span></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Review Objectives (0:03-0:05):</p><p>By the end of this session, you will be able to:</p><ol><li>Share documents and co-author in real-time - this is fundamental to modern collaboration</li><li>Switch between Editing and Suggesting modes - key for collaborative workflows</li><li>Use AI to generate, respond to, and resolve comments - the main AI collaboration features</li><li>Know when AI helps vs. when human judgment is needed - this is the critical thinking piece</li></ol></div></div>`
            },
            {
                title: "Slide 3: Session Overview",
                content: `<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Session Overview</h2><div class="w-full max-w-4xl"><div class="grid grid-cols-3 gap-4 mb-6"><div class="bg-blue-600/20 p-4 rounded-xl border-l-4 border-blue-400 text-center"><div class="text-3xl font-bold text-blue-400 mb-2">12</div><div class="text-sm text-slate-400 uppercase tracking-wide">Minutes</div><div class="text-lg font-semibold mt-2 text-blue-300">LEARN</div></div><div class="bg-emerald-600/20 p-4 rounded-xl border-l-4 border-emerald-400 text-center"><div class="text-3xl font-bold text-emerald-400 mb-2">18</div><div class="text-sm text-slate-400 uppercase tracking-wide">Minutes</div><div class="text-lg font-semibold mt-2 text-emerald-300">CONSOLIDATE</div></div><div class="bg-purple-600/20 p-4 rounded-xl border-l-4 border-purple-400 text-center"><div class="text-3xl font-bold text-purple-400 mb-2">2</div><div class="text-sm text-slate-400 uppercase tracking-wide">Minutes</div><div class="text-lg font-semibold mt-2 text-purple-300">COMPRESS</div></div></div></div></div>`,
                notes: `<div class="slide-cue-box">***[Advance to Slide 3]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:05 - 0:07</span></div><div class="guidance-box"><div class="guidance-header"><i class="fa-solid fa-lightbulb"></i>TRAINER GUIDANCE</div><ul><li>Quick overview of session structure</li><li>Note the 40:60 split - more workshop time</li><li>Point out they'll co-author real documents in this session</li></ul></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Session Structure (0:05-0:07):</p><p>Here's how our 30 minutes breaks down:</p><ul><li><strong>Learn (12 min):</strong> Collaboration fundamentals and AI commenting features</li><li><strong>Consolidate (18 min):</strong> Co-author a document with your neighbor using AI</li><li><strong>Compress (2 min):</strong> Take away your AI Collaboration Checklist</li></ul></div></div>`
            },
            {
                title: "Slide 4: The Shift in Collaboration",
                content: `<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">The Shift in Collaboration</h2><div class="w-full max-w-5xl"><div class="grid grid-cols-1 md:grid-cols-2 gap-8"><div class="bg-slate-800/50 p-6 rounded-xl border border-slate-700"><div class="flex items-center gap-3 mb-4"><div class="w-10 h-10 rounded-full bg-red-500/20 flex items-center justify-center"><i class="fa-solid fa-clock text-red-400"></i></div><h3 class="font-bold text-xl text-red-400">Traditional Workflow</h3></div><div class="space-y-2 text-slate-400 text-sm"><p>You → Create document</p><p>↓</p><p>Attach to email → Send</p><p>↓</p><p>Wait for response...</p></div></div><div class="bg-emerald-900/20 p-6 rounded-xl border border-emerald-500/30"><div class="flex items-center gap-3 mb-4"><div class="w-10 h-10 rounded-full bg-emerald-500/20 flex items-center justify-center"><i class="fa-solid fa-bolt text-emerald-400"></i></div><h3 class="font-bold text-xl text-emerald-400">Modern Workflow</h3></div><div class="space-y-2 text-emerald-400 text-sm"><p>Create → Share link</p><p>↓</p><p>Colleagues edit simultaneously</p><p>↓</p><p>AI assists → Done!</p></div></div></div></div></div>`,
                notes: `<div class="slide-cue-box">***[Advance to Slide 4]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:07 - 0:10</span></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">The Shift (0:07-0:10):</p><p>Let's talk about HOW we collaborate has changed:</p><ul><li><strong>Traditional:</strong> Create → Email attachment → Wait → Incorporate changes → Repeat. This takes DAYS.</li><li><strong>Modern:</strong> Create → Share link → Everyone edits simultaneously → AI helps with feedback → Done. This takes MINUTES.</li></ul><p>The shift is from "send and wait" to "share and collaborate." Google Docs makes this possible, and AI makes the feedback part faster.</p></div></div>`
            },
            {
                title: "Slide 5: Key Collaboration Features",
                content: `<div class="w-full flex flex-col items-center justify-center"><h2 class="text-4xl font-bold mb-8 gradient-text">Key Collaboration Features</h2><div class="w-full max-w-5xl"><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-12 h-12 rounded-xl bg-blue-500/20 flex items-center justify-center mb-4"><i class="fa-solid fa-users text-blue-400 text-xl"></i></div><h3 class="font-bold text-lg mb-2">Real-Time Cursors</h3><p class="text-sm text-slate-400">See where others are working instantly</p></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-12 h-12 rounded-xl bg-purple-500/20 flex items-center justify-center mb-4"><i class="fa-solid fa-pen-fancy text-purple-400 text-xl"></i></div><h3 class="font-bold text-lg mb-2">Suggesting Mode</h3><p class="text-sm text-slate-400">Track changes without overwriting</p></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-12 h-12 rounded-xl bg-yellow-500/20 flex items-center justify-center mb-4"><i class="fa-solid fa-comment text-yellow-400 text-xl"></i></div><h3 class="font-bold text-lg mb-2">Comments</h3><p class="text-sm text-slate-400">Feedback without changing text</p></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-12 h-12 rounded-xl bg-teal-500/20 flex items-center justify-center mb-4"><i class="fa-solid fa-bookmark text-teal-400 text-xl"></i></div><h3 class="font-bold text-lg mb-2">Named Locations</h3><p class="text-sm text-slate-400">Jump to specific sections</p></div><div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700"><div class="w-12 h-12 rounded-xl bg-red-500/20 flex items-center justify-center mb-4"><i class="fa-solid fa-history text-red-400 text-xl"></i></div><h3 class="font-bold text-lg mb-2">Version History</h3><p class="text-sm text-slate-400">See all changes over time</p></div></div></div></div>`,
                notes: `<div class="slide-cue-box">***[Advance to Slide 5]***</div><div class="timing-box"><i class="fa-regular fa-clock text-purple-400"></i><span class="time-range">0:10 - 0:12</span></div><div class="trainer-notes-section"><div class="notes-header"><i class="fa-solid fa-clipboard"></i>FULL TRAINER SCRIPT</div><div class="trainer-note"><p class="script-heading">Collaboration Features (0:10-0:12):</p><p>The five key features that make Google Docs collaboration powerful:</p><ol><li><strong>Real-time cursors:</strong> See exactly where others are working - no more "I was editing that!"</li><li><strong>Suggesting mode:</strong> Propose changes without overwriting - the owner decides what to accept</li><li><strong>Comments:</strong> Feedback that doesn't change the text - for questions and discussions</li><li><strong>Named locations:</strong> Jump to specific sections - helpful in long documents</li><li><strong>Version history:</strong> See every change, who made it, and when - restore if needed</li></ol></div></div>`
            },
            {

        let currentSlide = 0;
        const totalSlides = courseData.length;

        function updateSlide() {
            const slide = courseData[currentSlide];
            document.getElementById('slide-info').innerHTML = `<h3 class="text-purple-300 font-bold text-lg mb-4">${slide.title}</h3>`;
            document.getElementById('notes-content').innerHTML = slide.notes;
            document.getElementById('slideCounter').textContent = `Slide ${currentSlide + 1} / ${totalSlides}`;
            document.getElementById('bannerSlide').textContent = currentSlide + 1;
            document.getElementById('bannerTotal').textContent = totalSlides;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;

            const previewContent = document.getElementById('preview-content');
            previewContent.innerHTML = slide.content;
            previewContent.style.fontSize = '12px';
            previewContent.style.lineHeight = '1.4';

            const aspectRatio = 16 / 9;
            const containerWidth = previewContent.parentElement.clientWidth;
            const containerHeight = previewContent.parentElement.clientHeight;

            let scale = 1;
            if (containerWidth && containerHeight) {
                const scaleX = containerWidth / 1600;
                const scaleY = containerHeight / (1600 / aspectRatio);
                scale = Math.min(scaleX, scaleY, 1);
            }

            previewContent.style.transform = `scale(${scale})`;
            previewContent.style.width = '1600px';
            previewContent.style.height = `${1600 / aspectRatio}px`;
            previewContent.style.maxWidth = 'none';

            channel.postMessage({ type: 'sync', index: currentSlide });
        }

        function nextSlide() {
            if (currentSlide < totalSlides - 1) { currentSlide++; updateSlide(); }
        }

        function prevSlide() {
            if (currentSlide > 0) { currentSlide--; updateSlide(); }
        }

        document.getElementById('nextBtn').addEventListener('click', nextSlide);
        document.getElementById('prevBtn').addEventListener('click', prevSlide);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
        });

        const splitSlider = document.getElementById('splitSlider');
        const splitValue = document.getElementById('splitValue');
        splitSlider.addEventListener('input', () => {
            const val = splitSlider.value;
            splitValue.textContent = val + '%';
            document.getElementById('previewPane').style.height = val + '%';
            document.getElementById('notesPane').style.flex = '1';
        });

        window.addEventListener('resize', updateSlide);
        updateSlide();
    </script>
